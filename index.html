<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>M2NDLAB — Payment Result</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

  <style>
    :root {
      /* status colors – overridden by JS */
      --sc:    #2563EB;
      --sc-l:  #60A5FA;
      --sc-g:  rgba(37,99,235,.18);
      --sc-glow: rgba(37,99,235,.35);

      --bg:      #07090F;
      --glass:   rgba(10,14,26,.78);
      --glass2:  rgba(14,20,36,.6);
      --border:  rgba(255,255,255,.08);
      --border2: rgba(255,255,255,.13);
      --surface: rgba(255,255,255,.04);
      --surface2:rgba(255,255,255,.07);

      --text:  #F0F5FF;
      --text2: #9CB0D0;
      --muted: #4A6080;
      --code:  rgba(0,0,0,.4);

      --r:   16px;
      --rsm: 8px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%; font-family: 'Outfit', sans-serif;
      background: var(--bg); color: var(--text);
      -webkit-font-smoothing: antialiased;
    }

    /* WebGL canvas */
    #bg {
      position: fixed; inset: 0; z-index: 0;
      pointer-events: none; width: 100%; height: 100%;
    }

    .page {
      position: relative; z-index: 1;
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: flex-start;
      padding: 32px 16px 64px;
    }

    /* ── CARD ── */
    .card-wrap { width: 100%; max-width: 680px; perspective: 1400px; }

    .flipper {
      position: relative;
      transform-style: preserve-3d;
      transition: transform .6s cubic-bezier(.4,0,.2,1);
    }
    .flipper.flipped { transform: rotateY(180deg); }

    .face {
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      background: var(--glass);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid var(--border);
      border-radius: var(--r);
      overflow: hidden;
      box-shadow:
        0 0 0 1px rgba(255,255,255,.04) inset,
        0 32px 80px rgba(0,0,0,.5),
        0 0 60px var(--sc-glow);
      transition: box-shadow .5s ease;
    }
    .face-back {
      position: absolute; inset: 0;
      transform: rotateY(180deg);
      display: flex; flex-direction: column;
      background: #070C14;
    }

    /* ── GHOST BUTTONS ── */
    .ghost-bar {
      position: absolute; top: 12px; right: 12px; left: 12px;
      display: flex; justify-content: space-between;
      z-index: 20; pointer-events: none;
    }
    .ghost {
      pointer-events: auto; width: 30px; height: 30px;
      border-radius: 8px; border: 1px solid rgba(255,255,255,.1);
      background: rgba(255,255,255,.05);
      color: var(--muted); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all .2s; backdrop-filter: blur(8px);
    }
    .ghost:hover {
      background: rgba(255,255,255,.12); color: var(--text);
      border-color: rgba(255,255,255,.2);
    }
    .ghost svg { width: 13px; height: 13px; stroke-width: 2; }
    .ghost.spin svg { animation: spin .7s linear infinite; }

    /* ── STATUS HERO ── */
    .s-hero {
      padding: 44px 28px 28px;
      text-align: center;
      position: relative;
    }

    .s-ring {
      width: 72px; height: 72px;
      border-radius: 50%; margin: 0 auto 16px;
      display: flex; align-items: center; justify-content: center;
      position: relative;
      background: var(--sc-g);
      border: 2px solid var(--sc);
      box-shadow: 0 0 0 8px var(--sc-g), 0 0 32px var(--sc-glow);
      transition: all .5s ease;
    }
    .s-ring svg { width: 30px; height: 30px; stroke: var(--sc); stroke-width: 2.5; }
    .s-ring .spin-icon { width: 28px; height: 28px; border: 3px solid var(--sc-g); border-top-color: var(--sc); border-radius: 50%; animation: spin .8s linear infinite; }

    .s-result {
      font-size: 11px; font-family: 'JetBrains Mono', monospace;
      letter-spacing: .15em; text-transform: uppercase;
      color: var(--sc); margin-bottom: 6px;
    }
    .s-title { font-size: 24px; font-weight: 800; letter-spacing: -.02em; line-height: 1.1; }
    .s-sub { font-size: 13px; color: var(--text2); margin-top: 6px; }

    /* Amount */
    .s-amount {
      display: flex; align-items: baseline; justify-content: center;
      gap: 4px; margin-top: 20px;
    }
    .amt-sym { font-size: 20px; font-weight: 700; color: var(--text2); }
    .amt-int { font-size: 48px; font-weight: 800; letter-spacing: -2px; color: var(--text); line-height: 1; }
    .amt-dec { font-size: 24px; font-weight: 700; color: var(--text2); }
    .amt-curr { font-size: 12px; font-family: 'JetBrains Mono', monospace; color: var(--muted); margin-left: 4px; align-self: center; }

    /* ── PILLS ROW ── */
    .pills-row {
      display: flex; flex-wrap: wrap; gap: 6px;
      padding: 0 20px 20px; justify-content: center;
    }
    .pill {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 5px 12px; border-radius: 99px;
      font-size: 11px; font-family: 'JetBrains Mono', monospace;
      border: 1px solid var(--border2);
      background: var(--surface);
      color: var(--text2);
    }
    .pill .pd { width: 6px; height: 6px; border-radius: 50%; background: var(--sc); flex-shrink: 0; }

    /* ── WARNING BANNER ── */
    .w-banner {
      margin: 0 20px 16px;
      padding: 12px 16px;
      border-radius: var(--rsm);
      background: rgba(245,158,11,.08);
      border: 1px solid rgba(245,158,11,.25);
      display: flex; gap: 10px; align-items: flex-start;
    }
    .w-banner svg { flex-shrink: 0; width: 16px; height: 16px; color: #F59E0B; margin-top: 1px; }
    .w-banner p { font-size: 12px; color: #FDE68A; line-height: 1.6; }
    .w-banner p strong { color: #F59E0B; }

    /* Error box */
    .err-box {
      margin: 0 20px 16px;
      padding: 14px 16px;
      border-radius: var(--rsm);
      background: rgba(239,68,68,.08);
      border: 1px solid rgba(239,68,68,.2);
    }
    .err-box .err-code {
      font-family: 'JetBrains Mono', monospace; font-size: 10px;
      color: rgba(239,68,68,.6); letter-spacing: .1em; text-transform: uppercase; margin-bottom: 5px;
    }
    .err-box .err-desc { font-size: 14px; font-weight: 600; color: #FCA5A5; }

    /* ── SECTIONS ── */
    .section { border-top: 1px solid var(--border); }

    .sec-head {
      padding: 14px 20px 10px;
      display: flex; align-items: center; justify-content: space-between;
      cursor: pointer; user-select: none;
    }
    .sec-head-fixed { padding: 14px 20px 10px; }
    .sec-label {
      font-family: 'JetBrains Mono', monospace; font-size: 9px;
      letter-spacing: .12em; text-transform: uppercase;
      color: var(--muted); display: flex; align-items: center; gap: 6px;
    }
    .sec-label .sc-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--sc); opacity: .5; }
    .sec-chevron { font-size: 10px; color: var(--muted); transition: transform .2s; }
    .sec-head.open .sec-chevron { transform: rotate(180deg); }
    .sec-body { overflow: hidden; }
    .sec-body.closed { display: none; }

    /* ── ROWS ── */
    .row {
      display: flex; justify-content: space-between; align-items: flex-start;
      padding: 5px 20px; gap: 16px;
      transition: background .13s;
    }
    .row:hover { background: var(--surface); }
    .rk {
      font-size: 11.5px; color: var(--text2); font-weight: 500;
      flex-shrink: 0; min-width: 130px;
    }
    .rv {
      font-size: 11px; font-weight: 600; color: var(--text);
      text-align: right; word-break: break-all;
      font-family: 'JetBrains Mono', monospace;
    }
    .rv.txt { font-family: 'Outfit', sans-serif; font-size: 11.5px; }
    .rv.nil { color: var(--muted); font-style: italic; font-weight: 400; font-family: 'JetBrains Mono', monospace; font-size: 11px; }

    /* Badges */
    .b {
      display: inline-flex; align-items: center; padding: 2px 9px;
      border-radius: 5px; font-size: 10.5px; font-weight: 700;
      font-family: 'Outfit', sans-serif;
    }
    .b-ok   { background: rgba(16,185,129,.15); color: #10B981; border: 1px solid rgba(16,185,129,.25); }
    .b-ko   { background: rgba(239,68,68,.12);  color: #EF4444; border: 1px solid rgba(239,68,68,.22); }
    .b-wait { background: rgba(245,158,11,.12); color: #F59E0B; border: 1px solid rgba(245,158,11,.25); }
    .b-info { background: rgba(96,165,250,.12); color: #60A5FA; border: 1px solid rgba(96,165,250,.22); }
    .b-mute { background: var(--surface);       color: var(--text2); border: 1px solid var(--border2); }

    /* Nest label */
    .nest { 
      font-size: 9px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase;
      color: var(--sc); padding: 8px 20px 4px;
      border-top: 1px dashed rgba(255,255,255,.05);
      font-family: 'JetBrains Mono', monospace;
    }

    /* Events timeline */
    .ev-item {
      padding: 8px 20px; display: flex; gap: 12px; align-items: flex-start;
    }
    .ev-item:not(:last-child) { border-bottom: 1px solid rgba(255,255,255,.04); }
    .ev-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--sc); flex-shrink: 0; margin-top: 4px;
      box-shadow: 0 0 6px var(--sc);
    }
    .ev-body { flex: 1; }
    .ev-type { font-size: 12px; font-weight: 700; color: var(--text); font-family: 'JetBrains Mono', monospace; }
    .ev-meta { font-size: 11px; color: var(--text2); margin-top: 2px; }
    .ev-amt { font-size: 13px; font-weight: 700; color: var(--sc); font-family: 'JetBrains Mono', monospace; }

    /* Auto-operation block */
    .auto-block {
      margin: 0 20px 14px; padding: 12px 16px;
      border-radius: var(--rsm); background: var(--surface);
      border: 1px solid var(--border2);
      display: flex; justify-content: space-between; align-items: center;
    }
    .auto-block .ab-label { font-size: 11px; color: var(--text2); }
    .auto-block .ab-val { font-family: 'JetBrains Mono', monospace; font-size: 12px; font-weight: 600; color: var(--text); }

    /* ── FOOTER ── */
    .card-foot {
      padding: 14px 20px;
      border-top: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      flex-wrap: wrap; gap: 10px;
    }
    .cf-left { font-size: 11px; color: var(--muted); }
    .cf-left strong { color: var(--text2); }
    .cf-links { display: flex; gap: 8px; align-items: center; }
    .cf-link {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 5px 11px; border-radius: 6px;
      font-size: 11px; font-family: 'Outfit', sans-serif; font-weight: 600;
      text-decoration: none; color: var(--text2);
      border: 1px solid var(--border2); background: var(--surface);
      transition: all .15s;
    }
    .cf-link:hover { border-color: var(--sc); color: var(--sc); }
    .cf-link svg { width: 12px; height: 12px; }
    .cf-sandbox {
      font-family: 'JetBrains Mono', monospace; font-size: 9px;
      padding: 2px 8px; border-radius: 4px;
      background: rgba(245,158,11,.1); color: #F59E0B;
      border: 1px solid rgba(245,158,11,.2);
    }

    /* ── JSON BACK ── */
    .jhead {
      padding: 12px 18px; background: #0C1020;
      border-bottom: 1px solid rgba(255,255,255,.06);
      display: flex; align-items: center; justify-content: space-between;
    }
    .jhead h3 { font-size: 10px; font-weight: 700; color: #4A6080; letter-spacing: .1em; text-transform: uppercase; font-family: 'JetBrains Mono', monospace; }
    .jbody { flex: 1; overflow: auto; padding: 16px 20px; background: #080C16; }
    .jbody pre { font-family: 'JetBrains Mono', monospace; font-size: 11px; line-height: 1.7; color: #8FA3C8; white-space: pre-wrap; word-break: break-all; }
    .jk { color: #7DD3FC; } .js { color: #86EFAC; } .jn { color: #FDE047; } .jb { color: #C084FC; } .jnl { color: #4A6080; font-style: italic; }

    /* ── SKELETON ── */
    .skel { animation: shimmer 1.6s ease-in-out infinite; background: linear-gradient(90deg, var(--surface) 25%, var(--surface2) 50%, var(--surface) 75%); background-size: 200% 100%; border-radius: 4px; }
    @keyframes shimmer { from{background-position:200% 0} to{background-position:-200% 0} }
    .skel-row { height: 12px; margin: 8px 20px; }

    /* ── ANIMATIONS ── */
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes fadeUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
    .anim-in { animation: fadeUp .4s ease both; }
    .pulse { animation: pulse 2s ease-in-out infinite; }

    /* draw-in check animation */
    @keyframes draw { from { stroke-dashoffset: 50; } to { stroke-dashoffset: 0; } }
    .draw-check { stroke-dasharray: 50; stroke-dashoffset: 50; animation: draw .5s .2s ease forwards; }
    @keyframes drawX { from { stroke-dashoffset: 30; } to { stroke-dashoffset: 0; } }
    .draw-x { stroke-dasharray: 30; stroke-dashoffset: 30; }
    .draw-x:nth-child(1) { animation: drawX .3s .1s ease forwards; }
    .draw-x:nth-child(2) { animation: drawX .3s .25s ease forwards; }

    /* ── MISSING PARAMS ── */
    .missing-wrap { padding: 40px 28px; text-align: center; }
    .missing-wrap h2 { font-size: 20px; font-weight: 700; margin-bottom: 10px; }
    .missing-wrap p { font-size: 13px; color: var(--text2); line-height: 1.6; }
    .missing-wrap code { display: block; margin-top: 16px; padding: 14px 16px; background: var(--code); border-radius: var(--rsm); font-family: 'JetBrains Mono', monospace; font-size: 11px; text-align: left; word-break: break-all; color: var(--text2); }

    @media (max-width: 600px) {
      .page { padding: 16px 10px 48px; }
      .amt-int { font-size: 36px; }
      .card-foot { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>
<body>

<canvas id="bg"></canvas>

<div class="page">
  <div class="card-wrap">
    <div class="ghost-bar" id="gFront">
      <button class="ghost" id="btnR" title="Refresh" onclick="doRefresh()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 2v6h-6"/><path d="M3 12a9 9 0 0115-6.7L21 8"/>
          <path d="M3 22v-6h6"/><path d="M21 12a9 9 0 01-15 6.7L3 16"/>
        </svg>
      </button>
      <button class="ghost" title="Raw JSON" onclick="toJson()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/>
        </svg>
      </button>
    </div>

    <div class="flipper" id="flip">

      <!-- FRONT -->
      <div class="face" id="front">
        <div id="front-content">
          <!-- skeleton loading -->
          <div id="skel-load">
            <div style="height:48px"></div>
            <div class="skel skel-row" style="width:60%;margin:0 auto 8px"></div>
            <div class="skel skel-row" style="width:40%;margin:0 auto 32px"></div>
            <div class="skel skel-row" style="width:90%"></div>
            <div class="skel skel-row" style="width:75%"></div>
            <div class="skel skel-row" style="width:85%"></div>
            <div class="skel skel-row" style="width:60%"></div>
            <div style="height:32px"></div>
          </div>
        </div>
      </div>

      <!-- BACK – Raw JSON -->
      <div class="face face-back" id="back">
        <div class="ghost-bar" style="position:absolute">
          <button class="ghost" title="Refresh" onclick="doRefresh()" style="background:rgba(255,255,255,.03)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 2v6h-6"/><path d="M3 12a9 9 0 0115-6.7L21 8"/>
              <path d="M3 22v-6h6"/><path d="M21 12a9 9 0 01-15 6.7L3 16"/>
            </svg>
          </button>
          <button class="ghost" title="Back" onclick="toFront()" style="background:rgba(255,255,255,.03)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
              <line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/>
            </svg>
          </button>
        </div>
        <div class="jhead" style="margin-top:44px">
          <h3>Raw API Response</h3>
          <button onclick="copyJson(this)" class="ghost" style="width:auto;padding:0 10px;font-size:10px;font-family:'JetBrains Mono',monospace;color:#4A6080">copy</button>
        </div>
        <div class="jbody"><pre id="jraw">No data yet.</pre></div>
      </div>

    </div>
  </div>
</div>

<script>
/* ═══════════════════════════════════════════════════
   WEBGL – Three.js particle field
═══════════════════════════════════════════════════ */
(function initWebGL() {
  const canvas = document.getElementById('bg');
  const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: false });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(60, 1, 0.1, 2000);
  camera.position.z = 80;

  // Primary particles
  const N = 1800;
  const pos = new Float32Array(N * 3);
  const sizes = new Float32Array(N);
  for (let i = 0; i < N; i++) {
    const r = 40 + Math.random() * 120;
    const theta = Math.random() * Math.PI * 2;
    const phi = Math.acos(2 * Math.random() - 1);
    pos[i*3]   = r * Math.sin(phi) * Math.cos(theta);
    pos[i*3+1] = r * Math.sin(phi) * Math.sin(theta);
    pos[i*3+2] = r * Math.cos(phi);
    sizes[i] = 0.3 + Math.random() * 1.2;
  }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  geo.setAttribute('size', new THREE.BufferAttribute(sizes, 1));

  const mat = new THREE.PointsMaterial({
    size: 0.8, color: new THREE.Color('#2563EB'),
    transparent: true, opacity: 0.55,
    blending: THREE.AdditiveBlending, depthWrite: false,
    sizeAttenuation: true,
  });
  const points = new THREE.Points(geo, mat);
  scene.add(points);

  // Secondary sparse stars
  const N2 = 600;
  const pos2 = new Float32Array(N2 * 3);
  for (let i = 0; i < N2; i++) {
    pos2[i*3]   = (Math.random()-0.5)*400;
    pos2[i*3+1] = (Math.random()-0.5)*400;
    pos2[i*3+2] = (Math.random()-0.5)*200;
  }
  const geo2 = new THREE.BufferGeometry();
  geo2.setAttribute('position', new THREE.BufferAttribute(pos2, 3));
  const mat2 = new THREE.PointsMaterial({
    size: 0.4, color: new THREE.Color('#ffffff'),
    transparent: true, opacity: 0.2,
    blending: THREE.AdditiveBlending, depthWrite: false,
  });
  scene.add(new THREE.Points(geo2, mat2));

  // Resize
  const resize = () => {
    const w = window.innerWidth, h = window.innerHeight;
    renderer.setSize(w, h);
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
  };
  resize();
  window.addEventListener('resize', resize);

  // Expose color setter
  let targetColor = new THREE.Color('#2563EB');
  const currentColor = new THREE.Color('#2563EB');
  window.setParticleColor = (hex) => { targetColor.set(hex); };

  // Mouse parallax
  let mx = 0, my = 0;
  document.addEventListener('mousemove', e => {
    mx = (e.clientX / window.innerWidth - 0.5) * 2;
    my = (e.clientY / window.innerHeight - 0.5) * 2;
  });

  let t = 0;
  const animate = () => {
    requestAnimationFrame(animate);
    t += 0.003;
    points.rotation.y = t * 0.08 + mx * 0.04;
    points.rotation.x = my * 0.03;
    currentColor.lerp(targetColor, 0.02);
    mat.color.copy(currentColor);
    renderer.render(scene, camera);
  };
  animate();
})();

/* ═══════════════════════════════════════════════════
   APP STATE
═══════════════════════════════════════════════════ */
const P = new URLSearchParams(window.location.search);
function gp(n) {
  const e = P.get(n); if (e !== null) return e;
  const l = n.toLowerCase();
  for (const [k, v] of P.entries()) if (k.toLowerCase() === l) return v;
  return '';
}
const SL  = gp('a');
const US  = gp('Status');
const PID = gp('paymentID');
const PT  = gp('paymentToken');

const API_SANDBOX = 'https://sandbox.gestpay.net/api';
let rawJson = null;

/* ─── Status configuration ─── */
const STATUS_CFG = {
  APPROVED:    { key:'ok',   color:'#10B981', glow:'rgba(16,185,129,.35)', label:'Pagamento Approvato',  sub:'Transazione elaborata con successo' },
  DECLINED:    { key:'ko',   color:'#EF4444', glow:'rgba(239,68,68,.35)',  label:'Pagamento Rifiutato',  sub:'La transazione non ha avuto esito positivo' },
  PENDING:     { key:'wait', color:'#F59E0B', glow:'rgba(245,158,11,.3)',  label:'In Attesa di Conferma',sub:'L\'esito non è ancora definitivo' },
  WAITING:     { key:'wait', color:'#F59E0B', glow:'rgba(245,158,11,.3)',  label:'Pagamento in Corso',   sub:'Il pagamento è in elaborazione' },
  UNSUBMITTED: { key:'wait', color:'#F59E0B', glow:'rgba(245,158,11,.3)',  label:'Non Ancora Avviato',   sub:'Il pagamento non è ancora stato inviato' },
  XX:          { key:'wait', color:'#F59E0B', glow:'rgba(245,158,11,.3)',  label:'Stato Sospeso (XX)',   sub:'In attesa di notifica S2S finale' },
  LOADING:     { key:'load', color:'#2563EB', glow:'rgba(37,99,235,.35)',  label:'Caricamento…',         sub:'Recupero dettagli transazione' },
  ERROR:       { key:'ko',   color:'#EF4444', glow:'rgba(239,68,68,.35)',  label:'Errore',               sub:'Impossibile recuperare i dettagli' },
};

function getCfg(result) {
  const u = (result || '').toUpperCase();
  return STATUS_CFG[u] || { key:'ko', color:'#EF4444', glow:'rgba(239,68,68,.35)', label: result || 'Sconosciuto', sub:'Stato non riconosciuto' };
}

function applyTheme(cfg) {
  const r = document.documentElement.style;
  r.setProperty('--sc',     cfg.color);
  r.setProperty('--sc-l',   cfg.color);
  r.setProperty('--sc-g',   cfg.glow.replace('.35)','.15)').replace('.3)','.12)'));
  r.setProperty('--sc-glow',cfg.glow);
  if (window.setParticleColor) window.setParticleColor(cfg.color);
}

/* ─── JSON highlight ─── */
function hl(j) {
  return JSON.stringify(j, null, 2).replace(
    /("(\\u[\da-fA-F]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g,
    m => {
      let c = 'jn';
      if (/^"/.test(m)) c = /:$/.test(m) ? 'jk' : 'js';
      else if (/true|false/.test(m)) c = 'jb';
      else if (/null/.test(m)) c = 'jnl';
      return `<span class="${c}">${m}</span>`;
    }
  );
}
function setJson(d) { rawJson = d; document.getElementById('jraw').innerHTML = d ? hl(d) : 'No data.'; }

/* ─── Value helpers ─── */
const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
function v(x) { return (x !== null && x !== undefined && x !== '') ? x : null; }
function hasVal(x) { return x !== null && x !== undefined && x !== '' && !(typeof x === 'object' && !Array.isArray(x) && Object.values(x).every(vv => !hasVal(vv))); }
function fmtAmt(a) { const n = parseFloat(a); return isNaN(n) ? null : n; }
function curSym(c) { return {EUR:'€',USD:'$',GBP:'£',CHF:'CHF'}[(c||'').toUpperCase()] || c || '€'; }

const EVT_LABEL = { AUT:'Authorization', MOV:'Settlement', CAN:'Cancellation', STO:'Refund', PRE:'Pre-Auth' };
const ST_LABEL  = { AUT:'Authorized', MOV:'Settled', CAN:'Cancelled', STO:'Refunded', PRE:'Pre-Authorized', WAITAUT:'Waiting Auth' };
const TDS_LABEL = { Y:'Authenticated', N:'Not Authenticated', A:'Attempted', U:'Unavailable', R:'Rejected', C:'Challenge Required' };
const TDS_CLASS = { Y:'ok', N:'ko', A:'wait', U:'mute', R:'ko', C:'wait' };

/* ─── Row renderers ─── */
function R(k, val, badge) {
  if (badge) return `<div class="row"><span class="rk">${k}</span><span class="rv">${val}</span></div>`;
  if (!hasVal(val)) return '';
  return `<div class="row"><span class="rk">${k}</span><span class="rv">${esc(String(val))}</span></div>`;
}
function Rt(k, val) {
  if (!hasVal(val)) return '';
  return `<div class="row"><span class="rk">${k}</span><span class="rv txt">${esc(String(val))}</span></div>`;
}
function badge(t, c) { return `<span class="b b-${c}">${esc(t)}</span>`; }
function resBadge(r) {
  const u = (r||'').toUpperCase();
  if (u==='APPROVED') return badge(r,'ok');
  if (u==='DECLINED') return badge(r,'ko');
  return badge(r||'—','wait');
}

/* ─── Collapsible section ─── */
function section(label, innerHtml, openByDefault = true) {
  if (!innerHtml.trim()) return '';
  const id = 'sec_' + Math.random().toString(36).slice(2,8);
  return `
    <div class="section">
      <div class="sec-head ${openByDefault?'open':''}" onclick="toggleSec(this)">
        <span class="sec-label"><span class="sc-dot"></span>${label}</span>
        <span class="sec-chevron">▾</span>
      </div>
      <div class="sec-body ${openByDefault?'':'closed'}">${innerHtml}</div>
    </div>`;
}
function toggleSec(h) { h.classList.toggle('open'); h.nextElementSibling.classList.toggle('closed'); }

/* ════════════════════════════════════════════════
   MAIN RENDER
════════════════════════════════════════════════ */
function renderCard(p) {
  const cfg = getCfg(p.transactionResult);
  applyTheme(cfg);

  const isOk    = cfg.key === 'ok';
  const isKo    = cfg.key === 'ko';
  const isWait  = cfg.key === 'wait';
  const result  = (p.transactionResult || '').toUpperCase();

  let html = '<div class="anim-in">';

  /* ── STATUS HERO ── */
  let iconHtml;
  if (isOk) {
    iconHtml = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><polyline class="draw-check" points="20 6 9 17 4 12" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
  } else if (isKo) {
    iconHtml = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round"><line class="draw-x" x1="18" y1="6" x2="6" y2="18"/><line class="draw-x" x1="6" y1="6" x2="18" y2="18"/></svg>`;
  } else if (isWait) {
    iconHtml = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>`;
  } else {
    iconHtml = `<div class="spin-icon"></div>`;
  }

  // Amount from events
  const firstEvent = p.events?.[0]?.event;
  const amt = fmtAmt(firstEvent?.eventamount);

  html += `<div class="s-hero">
    <div class="s-ring ${isWait?'pulse':''}">${iconHtml}</div>
    <div class="s-result">${p.transactionResult || 'UNKNOWN'}</div>
    <div class="s-title">${cfg.label}</div>
    <div class="s-sub">${cfg.sub}</div>`;

  if (amt !== null && amt > 0) {
    const parts = amt.toFixed(2).split('.');
    const intFmt = parseInt(parts[0]).toLocaleString('it-IT');
    html += `<div class="s-amount">
      <span class="amt-sym">${curSym(p.currency)}</span>
      <span class="amt-int">${intFmt}</span>
      <span class="amt-dec">,${parts[1]}</span>
      ${v(p.currency) ? `<span class="amt-curr">${p.currency}</span>` : ''}
    </div>`;
  }
  html += `</div>`;

  /* ── QUICK PILLS ── */
  const pills = [];
  if (v(p.paymentMethod)) pills.push(`<span class="pill"><span class="pd"></span>${esc(p.paymentMethod)}</span>`);
  if (v(p.company) && p.company !== p.paymentMethod) pills.push(`<span class="pill">${esc(p.company)}</span>`);
  if (v(p.bankTransactionID)) pills.push(`<span class="pill">TXN ${esc(p.bankTransactionID)}</span>`);
  if (v(p.authorizationCode)) pills.push(`<span class="pill">Auth ${esc(p.authorizationCode)}</span>`);
  if (v(p.maskedPAN)) pills.push(`<span class="pill">•••• ${esc(p.maskedPAN.slice(-4))}</span>`);
  if (pills.length) html += `<div class="pills-row">${pills.join('')}</div>`;

  /* ── WARNING BANNER (pending/waiting/XX) ── */
  if (isWait || result === 'XX') {
    html += `<div class="w-banner">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
      <p><strong>Non procedere con l'ordine.</strong><br>L'esito non è ancora definitivo. Attendi la notifica S2S che comunicherà il risultato finale (OK o KO).</p>
    </div>`;
  }

  /* ── ERROR BOX (declined) ── */
  if (isKo && v(p.transactionErrorCode) && p.transactionErrorCode !== '0') {
    html += `<div class="err-box">
      <div class="err-code">Codice errore ${esc(p.transactionErrorCode)}</div>
      <div class="err-desc">${esc(p.transactionErrorDescription || 'Transazione rifiutata')}</div>
    </div>`;
  }

  /* ── AUTO OPERATION BLOCK ── */
  if (p.automaticOperation && v(p.automaticOperation.type)) {
    const ao = p.automaticOperation;
    const aoType = (EVT_LABEL[ao.type] || ao.type || '—');
    const aoAmt  = fmtAmt(ao.amount);
    html += `<div class="auto-block">
      <div>
        <div class="ab-label">Operazione automatica pianificata</div>
        <div class="ab-val">${esc(aoType)}${v(ao.date) ? ` · ${esc(ao.date)}` : ''}</div>
      </div>
      ${aoAmt !== null ? `<div style="text-align:right"><div class="ab-label">Importo</div><div class="ab-val">${curSym(p.currency)} ${aoAmt.toFixed(2)}</div></div>` : ''}
    </div>`;
  }

  /* ── SECTION: TRANSAZIONE ── */
  {
    let s = '';
    if (v(p.transactionType)) s += Rt('Tipo transazione', p.transactionType);
    s += R('Esito', resBadge(p.transactionResult), true);
    if (v(p.transactionState)) s += Rt('Stato', ST_LABEL[p.transactionState] || p.transactionState);
    if (v(p.transactionErrorCode) && p.transactionErrorCode !== '0') {
      s += R('Codice errore', p.transactionErrorCode);
      s += Rt('Descrizione errore', p.transactionErrorDescription);
    }
    s += R('Payment ID', v(p.paymentID));
    s += R('Bank TX ID', v(p.bankTransactionID));
    s += R('Auth Code', v(p.authorizationCode));
    if (s) html += section('Transazione', s, true);
  }

  /* ── SECTION: ORDINE ── */
  {
    let s = '';
    s += R('Shop TX ID', v(p.shopTransactionID));
    s += R('Shop TX ID 2', v(p.shopTransactionID_2));
    s += Rt('Valuta', v(p.currency));
    s += Rt('Paese', v(p.country));
    if (s) html += section('Ordine', s, true);
  }

  /* ── SECTION: METODO DI PAGAMENTO ── */
  {
    let s = '';
    if (v(p.paymentMethod)) s += R('Metodo', badge(p.paymentMethod, 'info'), true);
    s += Rt('Circuito', v(p.company));
    s += Rt('Tipo prodotto', v(p.productType));
    s += R('PAN mascherato', v(p.maskedPAN));
    if (v(p.cvvPresent)) s += Rt('CVV presente', p.cvvPresent);
    s += R('3DS Level', v(p.tdLevel));
    if (s) html += section('Metodo di Pagamento', s, true);
  }

  /* ── SECTION: TOKEN & CARTA ── */
  {
    let s = '';
    s += R('Token', v(p.token));
    if (v(p.tokenExpiryMonth) || v(p.tokenExpiryYear))
      s += R('Scadenza token', `${p.tokenExpiryMonth||'—'}/${p.tokenExpiryYear||'—'}`);
    if (p.tokenDetails) {
      const td = p.tokenDetails;
      s += `<div class="nest">tokenDetails</div>`;
      s += R('Token Value', v(td.TokenValue));
      if (v(td.TokenExpiryMonth)||v(td.TokenExpiryYear)) s += R('Scadenza', `${td.TokenExpiryMonth||'—'}/${td.TokenExpiryYear||'—'}`);
      s += Rt('Provider', v(td.TokenProvider));
      if (td.CardDetails) {
        const cd = td.CardDetails;
        s += `<div class="nest">CardDetails</div>`;
        s += R('Suffisso carta', v(cd.CardSuffix));
        if (v(cd.CardExpiryMonth)||v(cd.CardExpiryYear)) s += R('Scadenza carta', `${cd.CardExpiryMonth||'—'}/${cd.CardExpiryYear||'—'}`);
        s += Rt('Titolare', v(cd.CardHolderName));
      }
    }
    if (s) html += section('Token & Carta', s, false);
  }

  /* ── SECTION: 3D SECURE ── */
  if (p.threeDS) {
    let s = '';
    const ar = p.threeDS.authenticationResult;
    const td = p.threeDS.transDetails;
    if (ar && hasVal(ar)) {
      s += `<div class="nest">Risultato autenticazione</div>`;
      if (v(ar.authenticationStatus)) s += R('Stato auth', badge(TDS_LABEL[ar.authenticationStatus]||ar.authenticationStatus, TDS_CLASS[ar.authenticationStatus]||'mute'), true);
      s += R('Livello', v(ar.authenticationLevel));
      s += R('ECI', v(ar.ECI));
      s += R('XID', v(ar.XID));
      s += R('Versione 3DS', v(ar.threeDsVersion));
      if (v(ar.AVAlgorithm)) s += R('AV Algorithm', ar.AVAlgorithm);
    }
    if (td && hasVal(td)) {
      s += `<div class="nest">Dettagli transazione</div>`;
      s += R('Auth Method', v(td.authMethod));
      s += R('Auth Timestamp', v(td.authTimeStamp));
      s += R('ACS ID', v(td.acsID));
    }
    if (s) html += section('3D Secure', s, false);
  }

  /* ── SECTION: EVENTI ── */
  if (p.events && p.events.length) {
    let s = '';
    p.events.forEach((ev, i) => {
      const e = ev.event;
      const eAmt = fmtAmt(e.eventamount);
      s += `<div class="ev-item">
        <div class="ev-dot"></div>
        <div class="ev-body">
          <div style="display:flex;justify-content:space-between;align-items:center">
            <div class="ev-type">${esc(EVT_LABEL[e.eventtype] || e.eventtype || '—')}</div>
            ${eAmt !== null && eAmt > 0 ? `<div class="ev-amt">${curSym(p.currency)} ${eAmt.toFixed(2)}</div>` : ''}
          </div>
          <div class="ev-meta">${v(e.eventdate) ? esc(e.eventdate) : '—'}${v(e.eventID) ? ` · ID ${esc(e.eventID)}` : ''}${v(e.eventARN) ? ` · ARN ${esc(e.eventARN)}` : ''}</div>
        </div>
      </div>`;
    });
    html += section(`Eventi (${p.events.length})`, s, true);
  }

  /* ── SECTION: ACQUIRENTE ── */
  if (p.buyer && (v(p.buyer.name) || v(p.buyer.email))) {
    let s = Rt('Nome', v(p.buyer.name)) + Rt('Email', v(p.buyer.email));
    if (s) html += section('Acquirente', s, false);
  }

  /* ── SECTION: RISK & FRAUD ── */
  {
    let s = '';
    if (p.risk && (v(p.risk.riskResponseCode) || v(p.risk.riskResponseDescription))) {
      s += `<div class="nest">Risk</div>`;
      s += R('Codice risk', v(p.risk.riskResponseCode));
      s += Rt('Descrizione', v(p.risk.riskResponseDescription));
    }
    if (p.fraudPrevention && v(p.fraudPrevention.check) && p.fraudPrevention.check !== 'FALSE') {
      s += `<div class="nest">Fraud Prevention</div>`;
      s += Rt('Check', v(p.fraudPrevention.check));
      s += Rt('Stato', v(p.fraudPrevention.state));
      s += Rt('Descrizione', v(p.fraudPrevention.description));
    }
    if (s) html += section('Risk & Antifrode', s, false);
  }

  /* ── SECTION: ALERT & CUSTOM ── */
  {
    let s = '';
    s += R('Alert Code', v(p.alertCode));
    s += Rt('Alert Description', v(p.alertDescription));
    if (p.customInfo && hasVal(p.customInfo)) s += Rt('customInfo', JSON.stringify(p.customInfo));
    if (p.dcc && hasVal(p.dcc)) s += Rt('dcc', JSON.stringify(p.dcc));
    if (s) html += section('Alert & Info Custom', s, false);
  }

  /* ── SECTION: ALTRO (catchall) ── */
  {
    const mapped = new Set([
      'transactionType','transactionResult','transactionState','transactionErrorCode','transactionErrorDescription',
      'bankTransactionID','authorizationCode','paymentID','shopTransactionID','shopTransactionID_2',
      'currency','country','paymentMethod','company','productType','maskedPAN','cvvPresent','tdLevel',
      'token','tokenExpiryMonth','tokenExpiryYear','tokenDetails','threeDS','events',
      'buyer','risk','fraudPrevention','automaticOperation','alertCode','alertDescription','customInfo','dcc'
    ]);
    const others = Object.keys(p).filter(k => !mapped.has(k));
    if (others.length) {
      let s = others.map(k => {
        const val = p[k];
        if (!hasVal(val)) return '';
        return typeof val === 'object' ? Rt(k, JSON.stringify(val)) : Rt(k, val);
      }).join('');
      if (s) html += section('Altri Campi', s, false);
    }
  }

  html += renderFooter();
  html += '</div>';

  document.getElementById('front-content').innerHTML = html;
}

/* ─── Render Error ─── */

  html += `<div class="s-hero">
    <div class="s-ring">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round"><line class="draw-x" x1="18" y1="6" x2="6" y2="18"/><line class="draw-x" x1="6" y1="6" x2="18" y2="18"/></svg>

    <div class="s-result">ERRORE</div>

  html += renderFooter();
  html += '</div>';
  document.getElementById('front-content').innerHTML = html;
}

/* ─── Fetch ─── */
async function load() {
  if (!PID || !PT) { renderMissing(); return; }

  // skeleton
  document.getElementById('front-content').innerHTML = `<div id="skel-load">
    <div style="height:48px"></div>
    <div class="skel skel-row" style="width:60%;margin:0 auto 8px"></div>
    <div class="skel skel-row" style="width:40%;margin:0 auto 32px"></div>
    <div class="skel skel-row" style="width:90%"></div>
    <div class="skel skel-row" style="width:75%"></div>
    <div class="skel skel-row" style="width:85%"></div>
    <div class="skel skel-row" style="width:60%"></div>
    <div style="height:32px"></div>
  </div>`;

  try {
    const res = await fetch(`${API_SANDBOX}/v1/payment/detail/${PID}`, {
      method: 'GET',
      headers: { 'Content-Type': 'application/json', 'PaymentToken': PT }
    });
    let data;
    try { data = await res.json(); } catch(e) { data = null; }
    setJson(data || { httpStatus: res.status, statusText: res.statusText });

    if (!res.ok) { renderError(`HTTP ${res.status}`, res.statusText, data); return; }
    if (data?.error?.code && data.error.code !== '0') {
      renderError('Errore API', `[${data.error.code}] ${data.error.description}`, data); return;
    }
    if (!data?.payload) { renderError('Risposta Inattesa', 'Nessun payload nella risposta API', data); return; }

    renderCard(data.payload);
  } catch(err) {
    setJson({ error: err.message });
    renderError('Errore di Connessione', `Impossibile raggiungere il gateway. ${err.message || ''}`, null);
  }
}

load();
</script>
</body>
</html>
