<!DOCTYPE html>
<html lang="it" data-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>M2NDLAB — Payment Result</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet"/>

  <style>
    /* ════════ DESIGN TOKENS ════════ */
    :root {
      --sc:     #2563EB;
      --sc-g:   rgba(37,99,235,.15);
      --sc-glow:rgba(37,99,235,.35);

      --bg:     #070B14;
      --glass:  rgba(10,16,30,.82);
      --card:   rgba(255,255,255,.04);
      --card-b: rgba(255,255,255,.075);
      --brd:    rgba(255,255,255,.08);
      --brd2:   rgba(255,255,255,.13);
      --surf:   rgba(255,255,255,.04);
      --surf2:  rgba(255,255,255,.07);

      --text:   #EFF5FF;
      --text2:  #95B0D0;
      --muted:  #48607E;
      --code:   rgba(0,0,0,.45);
      --panel:  rgba(8,14,26,.6);
      --r: 14px; --rsm: 8px; --rx: 20px;
    }
    [data-theme="light"] {
      --bg:     #EDF1FB;
      --glass:  rgba(255,255,255,.88);
      --card:   rgba(255,255,255,.7);
      --card-b: rgba(37,99,235,.08);
      --brd:    rgba(0,0,0,.08);
      --brd2:   rgba(0,0,0,.12);
      --surf:   rgba(0,0,0,.03);
      --surf2:  rgba(0,0,0,.06);
      --text:   #0B1726;
      --text2:  #3D5470;
      --muted:  #7A96B8;
      --code:   rgba(0,0,0,.04);
      --panel:  rgba(230,236,250,.7);
    }

    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%;font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased}

    /* ── CANVAS ── */
    #bg{position:fixed;inset:0;z-index:0;pointer-events:none}

    .page{position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:24px 16px 60px}

    /* ── CARD WRAP ── */
    .cw{width:100%;max-width:1080px;perspective:1600px}

    /* ── TOP BAR ── */
    .top-bar{
      display:flex;justify-content:space-between;align-items:center;
      margin-bottom:16px;padding:0 2px;
    }
    .tb-left{display:flex;gap:6px}
    .tb-right{display:flex;gap:6px;align-items:center}

    .ghost{
      width:32px;height:32px;border-radius:9px;
      border:1px solid var(--brd2);background:var(--card);
      color:var(--muted);cursor:pointer;
      display:flex;align-items:center;justify-content:center;
      transition:all .2s;backdrop-filter:blur(8px);
    }
    .ghost:hover{background:var(--surf2);color:var(--text);border-color:var(--sc)}
    .ghost svg{width:13px;height:13px;stroke-width:2;flex-shrink:0}
    .ghost.spin svg{animation:spin .7s linear infinite}

    /* Theme toggle */
    .theme-btn{
      display:flex;align-items:center;gap:6px;
      padding:6px 14px;border-radius:9px;
      border:1px solid var(--brd2);background:var(--card);
      color:var(--text2);cursor:pointer;font-family:'JetBrains Mono',monospace;
      font-size:10px;letter-spacing:.06em;transition:all .2s;
    }
    .theme-btn:hover{border-color:var(--sc);color:var(--sc)}
    .theme-btn svg{width:13px;height:13px;stroke-width:2}

    /* ── FLIPPER ── */
    .flipper{transform-style:preserve-3d;transition:transform .65s cubic-bezier(.4,0,.2,1);position:relative}
    .flipper.flipped{transform:rotateY(180deg)}

    .face{
      backface-visibility:hidden;-webkit-backface-visibility:hidden;
      background:var(--glass);
      backdrop-filter:blur(28px);-webkit-backdrop-filter:blur(28px);
      border:1px solid var(--brd);border-radius:var(--rx);overflow:hidden;
      box-shadow:0 0 0 1px rgba(255,255,255,.05) inset,0 40px 100px rgba(0,0,0,.4),0 0 80px var(--sc-glow);
      transition:box-shadow .5s;
    }
    .face-back{
      position:absolute;inset:0;transform:rotateY(180deg);
      display:flex;flex-direction:column;background:#050810;
    }

    /* ── 2-COL LAYOUT ── */
    .layout{display:grid;grid-template-columns:300px 1fr;min-height:400px}
    @media(max-width:900px){.layout{grid-template-columns:1fr}}

    /* ── LEFT PANEL ── */
    .panel-l{
      background:var(--panel);
      border-right:1px solid var(--brd);
      padding:36px 24px 24px;
      display:flex;flex-direction:column;gap:20px;
      position:sticky;top:0;align-self:flex-start;
    }
    @media(max-width:900px){
      .panel-l{position:static;border-right:none;border-bottom:1px solid var(--brd);padding:28px 20px}
    }

    /* Status ring */
    .s-ring{
      width:80px;height:80px;border-radius:50%;margin:0 auto;
      display:flex;align-items:center;justify-content:center;
      background:var(--sc-g);border:2.5px solid var(--sc);
      box-shadow:0 0 0 10px var(--sc-g),0 0 40px var(--sc-glow);
      transition:all .5s;
    }
    .s-ring svg{width:34px;height:34px;stroke:var(--sc);stroke-width:2.5}
    .spin-icon{width:30px;height:30px;border:3px solid var(--sc-g);border-top-color:var(--sc);border-radius:50%;animation:spin .8s linear infinite}
    .pulse{animation:pulse 2s ease-in-out infinite}

    .s-hero{text-align:center}
    .s-result{font-size:10px;font-family:'JetBrains Mono',monospace;letter-spacing:.15em;text-transform:uppercase;color:var(--sc);margin-bottom:5px;margin-top:14px}
    .s-title{font-size:20px;font-weight:800;letter-spacing:-.02em;line-height:1.15}
    .s-sub{font-size:12px;color:var(--text2);margin-top:5px;line-height:1.5}

    /* Amount */
    .s-amount{display:flex;align-items:baseline;justify-content:center;gap:3px;margin-top:16px}
    .amt-sym{font-size:18px;font-weight:700;color:var(--text2)}
    .amt-int{font-size:46px;font-weight:800;letter-spacing:-2px;color:var(--text);line-height:1}
    .amt-dec{font-size:22px;font-weight:700;color:var(--text2)}
    .amt-curr{font-size:11px;font-family:'JetBrains Mono',monospace;color:var(--muted);margin-left:4px;align-self:center}

    /* Pills */
    .pills{display:flex;flex-wrap:wrap;gap:5px;justify-content:center}
    .pill{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:99px;font-size:10.5px;font-family:'JetBrains Mono',monospace;border:1px solid var(--brd2);background:var(--surf);color:var(--text2)}
    .pill .pd{width:5px;height:5px;border-radius:50%;background:var(--sc);flex-shrink:0}

    /* Warning */
    .w-banner{padding:11px 14px;border-radius:var(--rsm);background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.25);display:flex;gap:9px;align-items:flex-start}
    .w-banner svg{flex-shrink:0;width:15px;height:15px;color:#F59E0B;margin-top:1px;stroke:#F59E0B}
    .w-banner p{font-size:11.5px;color:#FDE68A;line-height:1.55}
    .w-banner p strong{color:#F59E0B}

    /* Error box */
    .err-box{padding:13px 14px;border-radius:var(--rsm);background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2)}
    .err-code{font-family:'JetBrains Mono',monospace;font-size:9px;color:rgba(239,68,68,.6);letter-spacing:.1em;text-transform:uppercase;margin-bottom:4px}
    .err-desc{font-size:13px;font-weight:600;color:#FCA5A5}

    /* Auto-op */
    .auto-block{padding:11px 14px;border-radius:var(--rsm);background:var(--surf);border:1px solid var(--brd2);display:flex;justify-content:space-between;align-items:center}
    .ab-label{font-size:10px;color:var(--text2)}
    .ab-val{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:600;color:var(--text);margin-top:2px}

    /* Radar chart canvas */
    .radar-wrap{display:flex;flex-direction:column;align-items:center;gap:6px}
    .radar-lbl{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)}
    #radarCanvas{display:block}

    /* ── RIGHT PANEL ── */
    .panel-r{padding:20px;display:flex;flex-direction:column;gap:12px;overflow-y:auto}

    /* Section cards */
    .sc{
      background:var(--card);border:1px solid var(--brd);
      border-radius:var(--r);overflow:hidden;transition:border-color .2s;
    }
    .sc:hover{border-color:var(--brd2)}
    .sc-head{
      display:flex;align-items:center;justify-content:space-between;
      padding:11px 16px;cursor:pointer;user-select:none;
      border-bottom:1px solid var(--brd);
      background:var(--surf);
    }
    .sc-head.closed{border-bottom:none}
    .sc-hl{display:flex;align-items:center;gap:8px}
    .sc-dot{width:5px;height:5px;border-radius:50%;background:var(--sc);opacity:.6}
    .sc-name{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)}
    .sc-badge{font-family:'JetBrains Mono',monospace;font-size:9px;padding:2px 7px;border-radius:4px;background:var(--sc-g);color:var(--sc);border:1px solid rgba(37,99,235,.2)}
    .sc-chev{font-size:9px;color:var(--muted);transition:transform .2s}
    .sc-head.open .sc-chev{transform:rotate(180deg)}
    .sc-body{display:none}
    .sc-body.open{display:block}

    /* Rows inside cards */
    .row{display:flex;justify-content:space-between;align-items:flex-start;padding:6px 16px;gap:12px;transition:background .12s}
    .row:hover{background:var(--surf)}
    .rk{font-size:11.5px;color:var(--text2);font-weight:500;flex-shrink:0;min-width:120px}
    .rv{font-size:11px;font-weight:600;color:var(--text);text-align:right;word-break:break-all;font-family:'JetBrains Mono',monospace;display:flex;align-items:center;gap:6px;justify-content:flex-end}
    .rv.txt{font-family:'Outfit',sans-serif;font-size:11.5px}

    /* Copy button */
    .cp-btn{
      width:20px;height:20px;border-radius:4px;border:1px solid var(--brd2);
      background:transparent;color:var(--muted);cursor:pointer;
      display:inline-flex;align-items:center;justify-content:center;
      transition:all .15s;flex-shrink:0;
    }
    .cp-btn:hover{border-color:var(--sc);color:var(--sc)}
    .cp-btn svg{width:10px;height:10px;stroke-width:2}
    .cp-btn.ok{border-color:#10B981;color:#10B981}

    /* Nest label */
    .nest{font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--sc);padding:8px 16px 4px;border-top:1px dashed var(--brd);font-family:'JetBrains Mono',monospace}

    /* Badges */
    .b{display:inline-flex;align-items:center;padding:2px 8px;border-radius:5px;font-size:10.5px;font-weight:700;font-family:'Outfit',sans-serif}
    .b-ok  {background:rgba(16,185,129,.15);color:#10B981;border:1px solid rgba(16,185,129,.25)}
    .b-ko  {background:rgba(239,68,68,.12); color:#EF4444;border:1px solid rgba(239,68,68,.22)}
    .b-wait{background:rgba(245,158,11,.12);color:#F59E0B;border:1px solid rgba(245,158,11,.25)}
    .b-info{background:rgba(96,165,250,.12);color:#60A5FA;border:1px solid rgba(96,165,250,.22)}
    .b-mute{background:var(--surf);color:var(--text2);border:1px solid var(--brd2)}

    /* Events timeline */
    .ev-list{padding:4px 0}
    .ev-item{padding:10px 16px;display:flex;gap:12px;align-items:flex-start}
    .ev-item:not(:last-child){border-bottom:1px solid var(--brd)}
    .ev-track{display:flex;flex-direction:column;align-items:center;gap:0;padding-top:4px}
    .ev-dot{width:9px;height:9px;border-radius:50%;background:var(--sc);flex-shrink:0;box-shadow:0 0 8px var(--sc)}
    .ev-body{flex:1}
    .ev-top{display:flex;justify-content:space-between;align-items:center}
    .ev-type{font-size:12px;font-weight:700;color:var(--text);font-family:'JetBrains Mono',monospace}
    .ev-amt{font-size:14px;font-weight:800;color:var(--sc);font-family:'JetBrains Mono',monospace}
    .ev-meta{font-size:11px;color:var(--text2);margin-top:3px}

    /* ── FOOTER ── */
    .card-foot{padding:14px 20px;border-top:1px solid var(--brd);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
    .cf-left{font-size:11px;color:var(--muted)}
    .cf-left strong{color:var(--text2)}
    .cf-sbx{font-family:'JetBrains Mono',monospace;font-size:9px;padding:2px 7px;border-radius:4px;background:rgba(245,158,11,.1);color:#F59E0B;border:1px solid rgba(245,158,11,.2)}
    .cf-links{display:flex;gap:6px}
    .cf-link{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;border-radius:6px;font-size:11px;font-weight:600;text-decoration:none;color:var(--text2);border:1px solid var(--brd2);background:var(--surf);transition:all .15s}
    .cf-link:hover{border-color:var(--sc);color:var(--sc)}
    .cf-link svg{width:12px;height:12px}

    /* ── JSON BACK ── */
    .jhead{padding:12px 18px;background:#07090F;border-bottom:1px solid rgba(255,255,255,.06);display:flex;align-items:center;justify-content:space-between}
    .jhead h3{font-size:9px;font-weight:700;color:#3D5275;letter-spacing:.12em;text-transform:uppercase;font-family:'JetBrains Mono',monospace}
    .jbody{flex:1;overflow:auto;padding:16px 20px;background:#04070E}
    .jbody pre{font-family:'JetBrains Mono',monospace;font-size:11px;line-height:1.75;color:#7A9CC0;white-space:pre-wrap;word-break:break-all}
    .jk{color:#7DD3FC}.js{color:#86EFAC}.jn{color:#FDE047}.jb{color:#C084FC}.jnl{color:#3D5275;font-style:italic}

    /* ── SKELETON ── */
    .skel{animation:shimmer 1.6s ease-in-out infinite;background:linear-gradient(90deg,var(--surf) 25%,var(--surf2) 50%,var(--surf) 75%);background-size:200% 100%;border-radius:4px}
    @keyframes shimmer{from{background-position:200% 0}to{background-position:-200% 0}}
    .skel-row{height:12px;margin:8px 16px}

    /* ── MISSING ── */
    .miss{padding:40px 28px;text-align:center}
    .miss h2{font-size:20px;font-weight:700;margin-bottom:10px}
    .miss p{font-size:13px;color:var(--text2);line-height:1.6}
    .miss code{display:block;margin-top:14px;padding:14px 16px;background:var(--code);border-radius:var(--rsm);font-family:'JetBrains Mono',monospace;font-size:11px;text-align:left;word-break:break-all;color:var(--text2)}

    /* ── ANIMATIONS ── */
    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
    @keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
    @keyframes draw{from{stroke-dashoffset:50}to{stroke-dashoffset:0}}
    @keyframes drawX{from{stroke-dashoffset:30}to{stroke-dashoffset:0}}
    .anim-in{animation:fadeUp .4s ease both}
    .draw-check{stroke-dasharray:50;stroke-dashoffset:50;animation:draw .5s .2s ease forwards}
    .draw-x{stroke-dasharray:30;stroke-dashoffset:30}
    .draw-x:nth-child(1){animation:drawX .3s .1s ease forwards}
    .draw-x:nth-child(2){animation:drawX .3s .25s ease forwards}

    @media(max-width:600px){.page{padding:12px 10px 48px}.amt-int{font-size:36px}.card-foot{flex-direction:column;align-items:flex-start}}
  </style>
</head>
<body>
<canvas id="bg"></canvas>

<div class="page">
  <div class="cw">

    <!-- TOP BAR -->
    <div class="top-bar">
      <div class="tb-left">
        <button class="ghost" id="btnR" title="Aggiorna" onclick="doRefresh()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M21 2v6h-6"/><path d="M3 12a9 9 0 0115-6.7L21 8"/><path d="M3 22v-6h6"/><path d="M21 12a9 9 0 01-15 6.7L3 16"/></svg>
        </button>
        <button class="ghost" title="Raw JSON" onclick="toJson()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
        </button>
      </div>
      <div class="tb-right">
        <button class="theme-btn" id="themeBtn" onclick="toggleTheme()">
          <svg id="themeIco" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
          <span id="themeTxt">Light</span>
        </button>
      </div>
    </div>

    <!-- FLIPPER -->
    <div class="flipper" id="flip">

      <!-- FRONT -->
      <div class="face" id="front">
        <div id="front-content">
          <!-- skeleton -->
          <div class="layout">
            <div class="panel-l" style="padding-top:28px">
              <div style="text-align:center">
                <div class="skel" style="width:80px;height:80px;border-radius:50%;margin:0 auto 14px"></div>
                <div class="skel" style="width:60%;height:14px;margin:0 auto 8px;border-radius:4px"></div>
                <div class="skel" style="width:40%;height:12px;margin:0 auto;border-radius:4px"></div>
              </div>
            </div>
            <div class="panel-r">
              <div class="skel skel-row" style="width:90%"></div>
              <div class="skel skel-row" style="width:75%"></div>
              <div class="skel skel-row" style="width:85%"></div>
              <div class="skel skel-row" style="width:60%"></div>
              <div class="skel skel-row" style="width:80%"></div>
            </div>
          </div>
        </div>
      </div>

      <!-- BACK – JSON -->
      <div class="face face-back" id="back">
        <div style="position:absolute;top:10px;left:12px;right:12px;display:flex;justify-content:space-between;z-index:10">
          <button class="ghost" onclick="doRefresh()" style="background:rgba(255,255,255,.03)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M21 2v6h-6"/><path d="M3 12a9 9 0 0115-6.7L21 8"/><path d="M3 22v-6h6"/><path d="M21 12a9 9 0 01-15 6.7L3 16"/></svg>
          </button>
          <button class="ghost" onclick="toFront()" style="background:rgba(255,255,255,.03)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
          </button>
        </div>
        <div class="jhead" style="margin-top:44px">
          <h3>Raw API Response</h3>
          <button onclick="copyJson(this)" class="ghost" style="width:auto;padding:0 10px;font-size:10px;font-family:'JetBrains Mono',monospace;color:#3D5275">copy</button>
        </div>
        <div class="jbody"><pre id="jraw">Nessun dato.</pre></div>
      </div>

    </div><!-- /flipper -->
  </div>
</div>

<script>
/* ═══════════════════════════════════════════════════════
   2D CANVAS – Floating orbs background
═══════════════════════════════════════════════════════ */
(function bgInit() {
  const canvas = document.getElementById('bg');
  const ctx = canvas.getContext('2d');
  let W = 0, H = 0;
  let statusColor = '#2563EB';
  let currentColor = [37, 99, 235];
  let targetColor  = [37, 99, 235];

  // Parse hex → rgb array
  function hexToRgb(hex) {
    const r = parseInt(hex.slice(1,3),16);
    const g = parseInt(hex.slice(3,5),16);
    const b = parseInt(hex.slice(5,7),16);
    return [r,g,b];
  }

  // Orbs: large soft glowing circles
  const orbs = Array.from({length: 10}, (_, i) => ({
    x: Math.random(),
    y: Math.random(),
    r: 0.12 + Math.random() * 0.18,
    vx: (Math.random() - 0.5) * 0.00015,
    vy: (Math.random() - 0.5) * 0.00015,
    op: 0.12 + Math.random() * 0.18,
    phase: Math.random() * Math.PI * 2,
  }));

  // Small floating particles
  const dots = Array.from({length: 60}, () => ({
    x: Math.random(), y: Math.random(),
    r: 1 + Math.random() * 2.5,
    vx: (Math.random()-0.5)*0.0003,
    vy: (Math.random()-0.5)*0.0003,
    op: 0.15 + Math.random() * 0.35,
  }));

  function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  window.addEventListener('resize', resize);
  resize();

  // Expose color setter
  window.setParticleColor = hex => { targetColor = hexToRgb(hex); };

  let t = 0;
  function draw() {
    requestAnimationFrame(draw);
    t += 0.005;

    // Lerp color
    currentColor = currentColor.map((c,i) => c + (targetColor[i]-c)*0.015);
    const [r,g,b] = currentColor.map(Math.round);

    ctx.clearRect(0, 0, W, H);

    // Large orbs
    orbs.forEach(o => {
      o.x += o.vx; o.y += o.vy;
      if(o.x<-o.r) o.x=1+o.r; if(o.x>1+o.r) o.x=-o.r;
      if(o.y<-o.r) o.y=1+o.r; if(o.y>1+o.r) o.y=-o.r;
      const cx = o.x * W, cy = o.y * H;
      const rad = o.r * Math.min(W,H);
      const breathe = 1 + 0.06 * Math.sin(t + o.phase);
      const gr = ctx.createRadialGradient(cx, cy, 0, cx, cy, rad * breathe);
      gr.addColorStop(0, `rgba(${r},${g},${b},${o.op})`);
      gr.addColorStop(0.4, `rgba(${r},${g},${b},${o.op*0.4})`);
      gr.addColorStop(1, `rgba(${r},${g},${b},0)`);
      ctx.fillStyle = gr;
      ctx.beginPath();
      ctx.arc(cx, cy, rad * breathe, 0, Math.PI*2);
      ctx.fill();
    });

    // Small dots
    dots.forEach(d => {
      d.x += d.vx; d.y += d.vy;
      if(d.x<0) d.x=1; if(d.x>1) d.x=0;
      if(d.y<0) d.y=1; if(d.y>1) d.y=0;
      ctx.beginPath();
      ctx.arc(d.x*W, d.y*H, d.r, 0, Math.PI*2);
      ctx.fillStyle = `rgba(${r},${g},${b},${d.op})`;
      ctx.fill();
    });
  }
  draw();
})();

/* ═══════════════════════════════════════════════════════
   RADAR CHART
═══════════════════════════════════════════════════════ */
function drawRadar(scores, labels) {
  const canvas = document.getElementById('radarCanvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const size = 160;
  canvas.width = canvas.height = size;
  const cx = size/2, cy = size/2, R = size/2 - 22;
  const n = scores.length;
  const isDark = document.documentElement.dataset.theme === 'dark';

  ctx.clearRect(0, 0, size, size);

  // Get current status color
  const sc = getComputedStyle(document.documentElement).getPropertyValue('--sc').trim() || '#2563EB';

  function angle(i) { return (i / n) * Math.PI * 2 - Math.PI / 2; }
  function pt(i, radius) {
    return [cx + radius * Math.cos(angle(i)), cy + radius * Math.sin(angle(i))];
  }

  // Grid rings
  [0.25, 0.5, 0.75, 1].forEach(f => {
    ctx.beginPath();
    for(let i=0;i<n;i++) {
      const [x,y] = pt(i, R*f);
      i===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
    }
    ctx.closePath();
    ctx.strokeStyle = isDark ? 'rgba(255,255,255,.07)' : 'rgba(0,0,0,.07)';
    ctx.lineWidth = 1;
    ctx.stroke();
  });

  // Spokes
  for(let i=0;i<n;i++) {
    const [x,y] = pt(i, R);
    ctx.beginPath(); ctx.moveTo(cx,cy); ctx.lineTo(x,y);
    ctx.strokeStyle = isDark ? 'rgba(255,255,255,.08)' : 'rgba(0,0,0,.08)';
    ctx.lineWidth = 1; ctx.stroke();
  }

  // Fill area
  ctx.beginPath();
  scores.forEach((s,i) => {
    const [x,y] = pt(i, R * s);
    i===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
  });
  ctx.closePath();
  ctx.fillStyle = sc.replace(')', ',.18)').replace('rgb(','rgba(') || 'rgba(37,99,235,.18)';
  // parse hex for rgba
  try {
    const hex = sc.trim();
    const r2=parseInt(hex.slice(1,3),16), g2=parseInt(hex.slice(3,5),16), b2=parseInt(hex.slice(5,7),16);
    ctx.fillStyle = `rgba(${r2},${g2},${b2},.18)`;
    ctx.strokeStyle = `rgba(${r2},${g2},${b2},.8)`;
  } catch(e) {}
  ctx.fill();
  ctx.lineWidth = 1.5;
  ctx.stroke();

  // Dots on vertices
  scores.forEach((s,i) => {
    const [x,y] = pt(i, R*s);
    ctx.beginPath(); ctx.arc(x,y,3,0,Math.PI*2);
    ctx.fillStyle = sc; ctx.fill();
  });

  // Labels
  ctx.font = '8px JetBrains Mono, monospace';
  ctx.fillStyle = isDark ? 'rgba(148,176,208,.8)' : 'rgba(61,84,112,.8)';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  labels.forEach((lbl, i) => {
    const [x,y] = pt(i, R + 14);
    ctx.fillText(lbl, x, y);
  });
}

function renderCard(p) {
  const cfg = getCfg(p.transactionResult);
  applyTheme(cfg);
  const isOk=cfg.key==='ok', isKo=cfg.key==='ko', isWait=cfg.key==='wait';
  const result=(p.transactionResult||'').toUpperCase();

  /* ── Radar scores ── */
  const tdsAuth = (()=>{
    const s = p.threeDS?.authenticationResult?.authenticationStatus;
    return {Y:1.0,A:0.6,C:0.5,U:0.3,N:0.1,R:0.0}[s] ?? 0;
  })();
  const radarScores = [
    tdsAuth,
    p.cvvPresent==='TRUE' ? 1.0 : p.cvvPresent==='FALSE' ? 0.3 : 0,
    (v(p.token)||v(p.tokenDetails)) ? (p.tokenDetails?1.0:0.7) : 0,
    v(p.authorizationCode) ? 1.0 : 0.4,
    (!v(p.transactionErrorCode)||p.transactionErrorCode==='0') ? 1.0 : 0,
    v(p.bankTransactionID) ? 1.0 : 0.3,
  ];
  const radarLabels = ['3DS','CVV','Token','Auth','No Err','TXN'];

  /* ── Amount ── */
  const firstEvent = p.events?.[0]?.event;
  const amt = fmtAmt(firstEvent?.eventamount);

  /* ── Status icon ── */
  let iconHtml;
  if(isOk) iconHtml=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><polyline class="draw-check" points="20 6 9 17 4 12" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
  else if(isKo) iconHtml=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round"><line class="draw-x" x1="18" y1="6" x2="6" y2="18"/><line class="draw-x" x1="6" y1="6" x2="18" y2="18"/></svg>`;
  else if(isWait) iconHtml=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>`;
  else iconHtml=`<div class="spin-icon"></div>`;

  /* ── LEFT PANEL ── */
  let left = `
    <div class="s-hero anim-in">
      <div class="s-ring ${isWait?'pulse':''}">${iconHtml}</div>
      <div class="s-result">${p.transactionResult||'UNKNOWN'}</div>
      <div class="s-title">${cfg.label}</div>
      <div class="s-sub">${cfg.sub}</div>`;

  if(amt!==null&&amt>0){
    const parts=amt.toFixed(2).split('.');
    left+=`<div class="s-amount">
      <span class="amt-sym">${curSym(p.currency)}</span>
      <span class="amt-int">${parseInt(parts[0]).toLocaleString('it-IT')}</span>
      <span class="amt-dec">,${parts[1]}</span>
      ${v(p.currency)?`<span class="amt-curr">${p.currency}</span>`:''}
    </div>`;
  }
  left+=`</div>`;

  /* Pills */
  const pills=[];
  if(v(p.paymentMethod)) pills.push(`<span class="pill"><span class="pd"></span>${esc(p.paymentMethod)}</span>`);
  if(v(p.company)&&p.company!==p.paymentMethod) pills.push(`<span class="pill">${esc(p.company)}</span>`);
  if(v(p.bankTransactionID)) pills.push(`<span class="pill">TXN ${esc(p.bankTransactionID)}</span>`);
  if(v(p.authorizationCode)) pills.push(`<span class="pill">Auth ${esc(p.authorizationCode)}</span>`);
  if(pills.length) left+=`<div class="pills">${pills.join('')}</div>`;

  /* Warning */
  if(isWait||result==='XX') left+=`<div class="w-banner">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
    <p><strong>Non procedere con l'ordine.</strong><br>L'esito non è ancora definitivo. Attendi la notifica S2S.</p>
  </div>`;

  /* Error box */
  if(isKo&&v(p.transactionErrorCode)&&p.transactionErrorCode!=='0') left+=`<div class="err-box">
    <div class="err-code">Codice errore ${esc(p.transactionErrorCode)}</div>
    <div class="err-desc">${esc(p.transactionErrorDescription||'Transazione rifiutata')}</div>
  </div>`;

  /* Auto-operation */
  if(p.automaticOperation&&v(p.automaticOperation.type)){
    const ao=p.automaticOperation, aoAmt=fmtAmt(ao.amount);
    left+=`<div class="auto-block">
      <div><div class="ab-label">Operazione automatica</div><div class="ab-val">${esc(EVT_LBL[ao.type]||ao.type)}${v(ao.date)?` · ${esc(ao.date)}`:''}</div></div>
      ${aoAmt!==null?`<div style="text-align:right"><div class="ab-label">Importo</div><div class="ab-val">${curSym(p.currency)} ${aoAmt.toFixed(2)}</div></div>`:''}
    </div>`;
  }

  /* Radar */
  left += `<div class="radar-wrap">
    <div class="radar-lbl">Transaction Quality</div>
    <canvas id="radarCanvas" width="160" height="160"></canvas>
  </div>`;

  /* ── RIGHT PANEL – section cards ── */
  let right = '';

  /* Transaction */
  {
    let s='';
    if(v(p.transactionType)) s+=Rt('Tipo',p.transactionType);
    s+=R('Esito',resBadge(p.transactionResult),true);
    if(v(p.transactionState)) s+=Rt('Stato',ST_LBL[p.transactionState]||p.transactionState);
    if(v(p.transactionErrorCode)&&p.transactionErrorCode!=='0'){s+=R('Codice errore',p.transactionErrorCode);s+=Rt('Descrizione errore',p.transactionErrorDescription)}
    s+=R('Payment ID',v(p.paymentID),false,true);
    s+=R('Bank TX ID',v(p.bankTransactionID),false,true);
    s+=R('Auth Code',v(p.authorizationCode),false,true);
    right+=sc('Transazione',s,true);
  }

  /* Ordine */
  {
    let s='';
    s+=R('Shop TX ID',v(p.shopTransactionID),false,true);
    s+=R('Shop TX ID 2',v(p.shopTransactionID_2),false,true);
    s+=Rt('Valuta',v(p.currency));
    s+=Rt('Paese',v(p.country));
    right+=sc('Ordine',s,true);
  }

  /* Metodo pagamento */
  {
    let s='';
    if(v(p.paymentMethod)) s+=R('Metodo',badge(p.paymentMethod,'info'),true);
    s+=Rt('Circuito',v(p.company));
    s+=Rt('Tipo prodotto',v(p.productType));
    s+=R('PAN mascherato',v(p.maskedPAN),false,true);
    if(v(p.cvvPresent)) s+=Rt('CVV presente',p.cvvPresent);
    s+=R('3DS Level',v(p.tdLevel));
    right+=sc('Metodo di Pagamento',s,true);
  }

  /* Token & Carta */
  {
    let s='';
    s+=R('Token',v(p.token),false,true);
    if(v(p.tokenExpiryMonth)||v(p.tokenExpiryYear)) s+=R('Scadenza token',`${p.tokenExpiryMonth||'—'}/${p.tokenExpiryYear||'—'}`);
    if(p.tokenDetails){
      const td=p.tokenDetails;
      s+=`<div class="nest">tokenDetails</div>`;
      s+=R('Token Value',v(td.TokenValue),false,true);
      if(v(td.TokenExpiryMonth)||v(td.TokenExpiryYear)) s+=R('Scadenza',`${td.TokenExpiryMonth||'—'}/${td.TokenExpiryYear||'—'}`);
      s+=Rt('Provider',v(td.TokenProvider));
      if(td.CardDetails){const cd=td.CardDetails;s+=`<div class="nest">CardDetails</div>`;s+=R('Suffisso',v(cd.CardSuffix));if(v(cd.CardExpiryMonth)||v(cd.CardExpiryYear)) s+=R('Scadenza carta',`${cd.CardExpiryMonth||'—'}/${cd.CardExpiryYear||'—'}`);s+=Rt('Titolare',v(cd.CardHolderName))}
    }
    right+=sc('Token & Carta',s,false);
  }

  /* 3DS */
  if(p.threeDS){
    let s='';
    const ar=p.threeDS.authenticationResult, td2=p.threeDS.transDetails;
    if(ar&&hasVal(ar)){
      s+=`<div class="nest">Autenticazione</div>`;
      if(v(ar.authenticationStatus)) s+=R('Stato',badge(TDS_LBL[ar.authenticationStatus]||ar.authenticationStatus,TDS_CLS[ar.authenticationStatus]||'mute'),true);
      s+=R('Livello',v(ar.authenticationLevel));s+=R('ECI',v(ar.ECI));s+=R('XID',v(ar.XID),false,true);s+=R('Versione 3DS',v(ar.threeDsVersion));
    }
    if(td2&&hasVal(td2)){s+=`<div class="nest">Dettagli</div>`;s+=R('Auth Method',v(td2.authMethod));s+=R('Timestamp',v(td2.authTimeStamp));s+=R('ACS ID',v(td2.acsID),false,true)}
    right+=sc('3D Secure',s,false);
  }

  /* Eventi */
  if(p.events&&p.events.length){
    let s='<div class="ev-list">';
    p.events.forEach((ev,i)=>{
      const e=ev.event, eAmt=fmtAmt(e.eventamount);
      s+=`<div class="ev-item">
        <div class="ev-track"><div class="ev-dot"></div></div>
        <div class="ev-body">
          <div class="ev-top">
            <span class="ev-type">${esc(EVT_LBL[e.eventtype]||e.eventtype||'—')}</span>
            ${eAmt!==null&&eAmt>0?`<span class="ev-amt">${curSym(p.currency)} ${eAmt.toFixed(2)}</span>`:''}
          </div>
          <div class="ev-meta">${v(e.eventdate)?esc(e.eventdate):'—'}${v(e.eventID)?` · ID ${esc(e.eventID)}`:''}${v(e.eventARN)?` · ARN ${esc(e.eventARN)}`:''}</div>
        </div>
      </div>`;
    });
    s+='</div>';
    right+=sc(`Eventi`,s,true,p.events.length);
  }

  /* Acquirente */
  if(p.buyer&&(v(p.buyer.name)||v(p.buyer.email))){
    let s=Rt('Nome',v(p.buyer.name))+Rt('Email',v(p.buyer.email),true);
    right+=sc('Acquirente',s,false);
  }

  /* Risk & Fraud */
  {
    let s='';
    if(p.risk&&(v(p.risk.riskResponseCode)||v(p.risk.riskResponseDescription))){s+=`<div class="nest">Risk</div>`;s+=R('Codice',v(p.risk.riskResponseCode));s+=Rt('Descrizione',v(p.risk.riskResponseDescription))}
    if(p.fraudPrevention&&v(p.fraudPrevention.check)&&p.fraudPrevention.check!=='FALSE'){s+=`<div class="nest">Fraud Prevention</div>`;s+=Rt('Check',v(p.fraudPrevention.check));s+=Rt('Stato',v(p.fraudPrevention.state));s+=Rt('Descrizione',v(p.fraudPrevention.description))}
    right+=sc('Risk & Antifrode',s,false);
  }

  /* Alert & Custom */
  {
    let s='';
    s+=R('Alert Code',v(p.alertCode));s+=Rt('Alert Desc',v(p.alertDescription));
    if(p.customInfo&&hasVal(p.customInfo)) s+=Rt('customInfo',JSON.stringify(p.customInfo));
    if(p.dcc&&hasVal(p.dcc)) s+=Rt('DCC',JSON.stringify(p.dcc));
    right+=sc('Alert & Info Custom',s,false);
  }

  /* Catchall */
  {
    const mapped=new Set(['transactionType','transactionResult','transactionState','transactionErrorCode','transactionErrorDescription','bankTransactionID','authorizationCode','paymentID','shopTransactionID','shopTransactionID_2','currency','country','paymentMethod','company','productType','maskedPAN','cvvPresent','tdLevel','token','tokenExpiryMonth','tokenExpiryYear','tokenDetails','threeDS','events','buyer','risk','fraudPrevention','automaticOperation','alertCode','alertDescription','customInfo','dcc']);
    const others=Object.keys(p).filter(k=>!mapped.has(k));
    if(others.length){
      let s=others.map(k=>{const val=p[k];if(!hasVal(val))return '';return typeof val==='object'?Rt(k,JSON.stringify(val)):Rt(k,val)}).join('');
      right+=sc('Altri Campi',s,false);
    }
  }

  /* ── ASSEMBLE ── */
  document.getElementById('front-content').innerHTML = `
    <div class="layout">
      <div class="panel-l">${left}</div>
      <div class="panel-r">${right}</div>
    </div>
    ${renderFooter()}
  `;

  // Draw radar after DOM update
  requestAnimationFrame(() => drawRadar(radarScores, radarLabels));
}

/* ─── Render Error ─── */
function renderError(title, detail, errPayload) {
  const cfg=getCfg('ERROR'); applyTheme(cfg);
  let left=`<div class="s-hero anim-in">
    <div class="s-ring"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round"><line class="draw-x" x1="18" y1="6" x2="6" y2="18"/><line class="draw-x" x1="6" y1="6" x2="18" y2="18"/></svg></div>
    <div class="s-result">ERRORE</div>
    <div class="s-title">${esc(title)}</div>
    <div class="s-sub">${esc(detail||'')}</div>
  </div>`;
  if(errPayload?.error&&errPayload.error.code!=='0') left+=`<div class="err-box"><div class="err-code">API ${esc(errPayload.error.code)}</div><div class="err-desc">${esc(errPayload.error.description||'')}</div></div>`;

  let right='';
  let s=R('Shop Login',SL)+R('URL Status',US)+R('Payment ID',PID,false,true)+Rt('Ambiente','Sandbox');
  right+=sc('Parametri Richiesta',s,true);

  document.getElementById('front-content').innerHTML=`<div class="layout"><div class="panel-l">${left}</div><div class="panel-r">${right}</div></div>${renderFooter()}`;
}

/* ─── Missing ─── */
function renderMissing(){
  const cfg=getCfg('ERROR'); applyTheme(cfg);
  let left=`<div class="s-hero anim-in">
    <div class="s-ring"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round"><line class="draw-x" x1="18" y1="6" x2="6" y2="18"/><line class="draw-x" x1="6" y1="6" x2="18" y2="18"/></svg></div>
    <div class="s-result">PARAMETRI MANCANTI</div>
    <div class="s-title">URL Non Valida</div>
    <div class="s-sub">I parametri richiesti non sono presenti</div>
  </div>`;
  document.getElementById('front-content').innerHTML=`<div class="layout">
    <div class="panel-l">${left}</div>
    <div class="panel-r"><div class="miss"><p>Questa pagina richiede i seguenti parametri URL:</p><code>?a=SHOPLOGIN&Status=OK&paymentID=123456&paymentToken=xxxx-yyyy-zzzz</code></div></div>
  </div>${renderFooter()}`;
}

/* ─── Fetch ─── */
async function load(){
  if(!PID||!PT){renderMissing();return}
  try{
    const res=await fetch(`${API}/v1/payment/detail/${PID}`,{method:'GET',headers:{'Content-Type':'application/json','PaymentToken':PT}});
    let data; try{data=await res.json()}catch(e){data=null}
    setJson(data||{httpStatus:res.status,statusText:res.statusText});
    if(!res.ok){renderError(`HTTP ${res.status}`,res.statusText,data);return}
    if(data?.error?.code&&data.error.code!=='0'){renderError('Errore API',`[${data.error.code}] ${data.error.description}`,data);return}
    if(!data?.payload){renderError('Risposta Inattesa','Nessun payload',data);return}
    renderCard(data.payload);
  }catch(err){
    setJson({error:err.message});
    renderError('Errore di Connessione',`Impossibile raggiungere il gateway. ${err.message||''}`,null);
  }
}
load();
</script>
