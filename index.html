<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M2NDLAB — Payment Result</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        /*
         * Fabrick brand palette (sourced from fabrick.com):
         *   Primary navy: #002E6D
         *   Accent blue:  #0057B8
         *   Light blue:   #0066CC
         *   Sky/bg:       #EAF1FB
         *   Text dark:    #0B1A30
         *   Font:         Inter (main body on fabrick.com)
         */
        :root {
            --fabrick-navy:    #002E6D;
            --fabrick-blue:    #0057B8;
            --fabrick-accent:  #0066CC;
            --fabrick-sky:     #EAF1FB;
            --fabrick-dark:    #0B1A30;

            --ok:       #0D9668;
            --ok-bg:    #ECFDF5;
            --ok-ring:  #A7F3D0;
            --ko:       #DC2626;
            --ko-bg:    #FEF2F2;
            --ko-ring:  #FECACA;
            --wait:     #D97706;
            --wait-bg:  #FFFBEB;
            --wait-ring:#FDE68A;

            --bg:       #F3F5F9;
            --card:     #FFFFFF;
            --card-2:   #F8FAFC;
            --brd:      #E5E8EE;
            --brd-l:    #EEF1F5;

            --t1: #0B1A30;
            --t2: #475569;
            --t3: #94A3B8;

            --r-sm: 10px;
            --r-lg: 16px;
            --r-xl: 22px;
            --shadow: 0 1px 2px rgba(0,0,0,.03), 0 4px 16px rgba(0,0,0,.06);
        }

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        html {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            font-size: 14px;
            color: var(--t1);
            background: var(--bg);
            -webkit-font-smoothing: antialiased;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding: 32px 16px 48px;
        }

        .container { width: 100%; max-width: 720px; }

        /* ==== FLIP CARD ==== */
        .card-wrap { perspective: 1200px; position: relative; }
        .flipper {
            transition: transform 0.55s cubic-bezier(.4,0,.2,1);
            transform-style: preserve-3d;
            position: relative;
        }
        .flipper.flipped { transform: rotateY(180deg); }

        .face {
            backface-visibility: hidden; -webkit-backface-visibility: hidden;
            background: var(--card);
            border-radius: var(--r-xl);
            box-shadow: var(--shadow);
            border: 1px solid var(--brd-l);
            overflow: hidden;
        }
        .face-back {
            position: absolute; inset: 0;
            transform: rotateY(180deg);
            display: flex; flex-direction: column;
        }

        /* ==== GHOST BUTTONS ==== */
        .ghost-bar {
            position: absolute; top: 10px; left: 10px; right: 10px;
            display: flex; justify-content: space-between;
            z-index: 10; pointer-events: none;
        }
        .ghost {
            pointer-events: auto;
            width: 28px; height: 28px; border-radius: 7px;
            border: none; background: transparent;
            color: transparent; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all .25s;
        }
        .ghost:hover {
            background: rgba(255,255,255,.88); color: var(--fabrick-navy);
            box-shadow: 0 2px 8px rgba(0,0,0,.1);
        }
        .ghost svg { width: 13px; height: 13px; stroke-width: 2.5; }
        .ghost.spin svg { animation: spin .7s linear infinite; }

        /* Dark ghost for back face */
        .ghost-dark:hover { background: rgba(255,255,255,.1); color: #94A3B8; }

        /* ==== STATUS BANNER ==== */
        .banner { padding: 28px 24px 22px; text-align: center; position: relative; overflow: hidden; }
        .banner::after {
            content: ''; position: absolute; inset: 0; pointer-events: none;
            background: radial-gradient(ellipse at 40% 0%, currentColor 0%, transparent 65%);
            opacity: .05;
        }
        .banner.ok   { background: var(--ok-bg);   color: var(--ok); }
        .banner.ko   { background: var(--ko-bg);   color: var(--ko); }
        .banner.wait { background: var(--wait-bg);  color: var(--wait); }
        .banner.load { background: var(--fabrick-sky); color: var(--fabrick-blue); }
        .banner.err  { background: var(--ko-bg);   color: var(--ko); }

        .sicon {
            width: 54px; height: 54px; border-radius: 50%;
            display: inline-flex; align-items: center; justify-content: center;
            margin-bottom: 10px; font-size: 22px; font-weight: 800;
        }
        .banner.ok   .sicon { background: var(--ok);   color: #fff; box-shadow: 0 0 0 6px var(--ok-ring); }
        .banner.ko   .sicon { background: var(--ko);   color: #fff; box-shadow: 0 0 0 6px var(--ko-ring); }
        .banner.wait .sicon { background: var(--wait);  color: #fff; box-shadow: 0 0 0 6px var(--wait-ring); }
        .banner.load .sicon { background: var(--fabrick-blue); color: #fff; box-shadow: 0 0 0 6px #B8D4F0; }
        .banner.err  .sicon { background: var(--ko);   color: #fff; box-shadow: 0 0 0 6px var(--ko-ring); }

        .stitle { font-size: 18px; font-weight: 800; letter-spacing: -.3px; }
        .ssub   { font-size: 12px; opacity: .75; font-weight: 500; margin-top: 2px; }

        /* ==== AMOUNT ==== */
        .amt-bar {
            padding: 18px 24px;
            display: flex; align-items: baseline; justify-content: center; gap: 6px;
            border-bottom: 1px solid var(--brd);
            background: var(--card-2);
        }
        .amt-bar .cur { font-size: 18px; font-weight: 700; color: var(--t3); }
        .amt-bar .num { font-size: 34px; font-weight: 800; color: var(--fabrick-navy); letter-spacing: -1.5px; }
        .amt-bar .dec { font-size: 20px; font-weight: 700; color: var(--fabrick-navy); opacity: .6; }
        .amt-bar .cur-code { font-size: 12px; font-weight: 600; color: var(--t3); margin-left: 2px; text-transform: uppercase; }

        /* ==== SUSPENDED WARNING ==== */
        .warn-box {
            margin: 14px 16px 0; padding: 10px 12px;
            background: var(--wait-bg); border: 1px solid var(--wait-ring);
            border-radius: var(--r-sm); display: flex; gap: 8px;
        }
        .warn-box p { font-size: 11px; color: var(--wait); font-weight: 500; line-height: 1.5; }

        /* ==== CLUSTER SECTIONS ==== */
        .cluster { border-bottom: 1px solid var(--brd-l); }
        .cluster:last-of-type { border-bottom: none; }

        .cl-title {
            font-size: 10px; font-weight: 700; text-transform: uppercase;
            letter-spacing: .8px; color: var(--t3); padding: 14px 20px 6px;
        }

        .row {
            display: flex; justify-content: space-between; align-items: flex-start;
            padding: 5px 20px; gap: 10px;
        }
        .row:hover { background: var(--card-2); }
        .rk { font-size: 11.5px; color: var(--t2); font-weight: 500; flex-shrink: 0; }
        .rv {
            font-size: 11px; font-weight: 600; color: var(--t1);
            text-align: right; word-break: break-all;
            font-family: 'JetBrains Mono', monospace;
        }
        .rv.txt { font-family: 'Inter', sans-serif; font-size: 11.5px; }
        .rv.nil { color: var(--t3); font-style: italic; font-weight: 400; }

        /* Badges */
        .b { display: inline-flex; padding: 2px 8px; border-radius: 5px; font-size: 10.5px; font-weight: 700; font-family: 'Inter',sans-serif; }
        .b-blue { background: var(--fabrick-sky); color: var(--fabrick-blue); }
        .b-ok   { background: var(--ok-bg); color: var(--ok); }
        .b-ko   { background: var(--ko-bg); color: var(--ko); }
        .b-wait { background: var(--wait-bg); color: var(--wait); }
        .b-mute { background: var(--card-2); color: var(--t2); border: 1px solid var(--brd); }

        /* Collapsible */
        .cl-head {
            cursor: pointer; display: flex; align-items: center;
            justify-content: space-between; padding: 14px 20px 6px; user-select: none;
        }
        .cl-head .chev { font-size: 10px; color: var(--t3); transition: transform .2s; }
        .cl-head.open .chev { transform: rotate(180deg); }
        .cl-body { max-height: 0; overflow: hidden; transition: max-height .3s ease; }
        .cl-body.open { max-height: 1200px; }

        /* Nested label */
        .nest-label {
            font-size: 9px; font-weight: 700; letter-spacing: .5px;
            color: var(--fabrick-blue); text-transform: uppercase;
            padding: 8px 20px 2px;
            border-top: 1px dashed var(--brd-l);
        }

        /* ==== CARD FOOTER ==== */
        .cfoot {
            padding: 12px 20px;
            border-top: 1px solid var(--brd);
            display: flex; justify-content: space-between; align-items: center;
        }
        .cfoot p { font-size: 10.5px; color: var(--t3); }
        .cfoot-mid { display: flex; align-items: center; gap: 8px; }
        .cfoot-mid a { display: flex; color: var(--t3); opacity: .35; transition: opacity .2s; }
        .cfoot-mid a:hover { opacity: 1; }
        .cfoot-mid a svg { width: 14px; height: 14px; }
        .cfoot-mid .cdot { width: 3px; height: 3px; border-radius: 50%; background: var(--t3); opacity: .4; }
        .cfoot .sid { font-family: 'JetBrains Mono',monospace; font-size: 10px; color: var(--t3); text-align: right; }

        /* ==== JSON BACK ==== */
        .jhead { padding: 12px 18px; border-bottom: 1px solid rgba(255,255,255,.06); background: #1c2033; display: flex; align-items: center; }
        .jhead h3 { font-size: 10px; font-weight: 700; color: #64748B; letter-spacing: .8px; text-transform: uppercase; }
        .jbody { flex: 1; overflow: auto; padding: 14px 18px; background: #151826; }
        .jbody pre { font-family: 'JetBrains Mono',monospace; font-size: 10.5px; line-height: 1.65; color: #CBD5E1; white-space: pre-wrap; word-break: break-all; }
        .jk { color: #7DD3FC; } .js { color: #86EFAC; } .jn { color: #FDE047; } .jb { color: #C084FC; } .jnl { color: #64748B; font-style: italic; }

        /* ==== ANIMATIONS ==== */
        .spinner { width: 20px; height: 20px; border: 3px solid rgba(255,255,255,.3); border-top-color: #fff; border-radius: 50%; animation: spin .7s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes pulse { 0%,100%{opacity:1}50%{opacity:.4} }
        .pulse { animation: pulse 2s ease-in-out infinite; }
        @keyframes up { from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)} }
        .face:first-child { animation: up .45s ease-out; }

        @media(max-width:600px) {
            body { padding: 16px 10px 32px; }
            .cfoot { flex-direction: column; gap: 6px; text-align: center; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="card-wrap">
        <div class="ghost-bar" id="gFront">
            <button class="ghost" id="btnR" title="Refresh" onclick="doRefresh()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M21 2v6h-6"/><path d="M3 12a9 9 0 0115-6.7L21 8"/><path d="M3 22v-6h6"/><path d="M21 12a9 9 0 01-15 6.7L3 16"/></svg>
            </button>
            <button class="ghost" title="View raw JSON" onclick="toJson()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
            </button>
        </div>
        <div class="flipper" id="flip">
            <div class="face" id="front">
                <div class="banner load" id="ban">
                    <div class="sicon"><div class="spinner"></div></div>
                    <div class="stitle">Loading payment details…</div>
                    <div class="ssub">Retrieving transaction information</div>
                </div>
                <div id="body"></div>
            </div>
            <div class="face face-back" id="back">
                <div class="ghost-bar" style="position:absolute;">
                    <button class="ghost ghost-dark" title="Refresh" onclick="doRefresh()">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M21 2v6h-6"/><path d="M3 12a9 9 0 0115-6.7L21 8"/><path d="M3 22v-6h6"/><path d="M21 12a9 9 0 01-15 6.7L3 16"/></svg>
                    </button>
                    <button class="ghost ghost-dark" title="Back to details" onclick="toFront()">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
                    </button>
                </div>
                <div class="jhead"><h3>Raw API Response</h3></div>
                <div class="jbody"><pre id="jraw">No data yet.</pre></div>
            </div>
        </div>
    </div>
</div>

<script>
/* =================================================================
   M2NDLAB — PAYMENT RESULT PAGE
   Clustered layout, all fields mapped, "Other" catchall.
   Fabrick brand. Sandbox only.
   ================================================================= */

const P = new URLSearchParams(window.location.search);
function gp(n){const e=P.get(n);if(e!==null)return e;const l=n.toLowerCase();for(const[k,v]of P.entries())if(k.toLowerCase()===l)return v;return '';}
const SL=gp('a'), US=gp('Status'), PID=gp('paymentID'), PT=gp('paymentToken');
const API='https://sandbox.gestpay.net/api';

let rawJson=null;

/* ---- Flip ---- */
function toJson(){document.getElementById('flip').classList.add('flipped');document.getElementById('gFront').style.display='none';}
function toFront(){document.getElementById('flip').classList.remove('flipped');document.getElementById('gFront').style.display='flex';}
async function doRefresh(){const b=document.getElementById('btnR');b.classList.add('spin');toFront();await load();b.classList.remove('spin');}

/* ---- JSON highlight ---- */
function hl(j){return JSON.stringify(j,null,2).replace(/("(\\u[\da-fA-F]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g,m=>{let c='jn';if(/^"/.test(m))c=/:$/.test(m)?'jk':'js';else if(/true|false/.test(m))c='jb';else if(/null/.test(m))c='jnl';return`<span class="${c}">${m}</span>`;});}
function setJson(d){rawJson=d;document.getElementById('jraw').innerHTML=d?hl(d):'No data.';}

/* ---- Status config ---- */
function sc(r){
    const u=(r||'').toUpperCase();
    if(u==='APPROVED'||u==='OK')return{t:'ok',i:'✓',h:'Payment Approved',s:'Transaction successfully processed'};
    if(u==='DECLINED'||u==='KO')return{t:'ko',i:'✕',h:'Payment Declined',s:'The transaction could not be completed'};
    if(['PENDING','WAITING','UNSUBMITTED','XX'].includes(u)){
        const m={PENDING:'Awaiting confirmation from payment provider',WAITING:'Payment is still being processed',UNSUBMITTED:'Payment has not been submitted yet',XX:'Status is not yet final'};
        return{t:'wait',i:'⏳',h:'Payment Pending',s:m[u]||'Awaiting confirmation',warn:true};
    }
    return{t:'ko',i:'?',h:'Unknown Status',s:`Result: ${r||'N/A'}`};
}

/* ---- Helpers ---- */
const esc=s=>s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
function v(x){return(x!==null&&x!==undefined&&x!=='')?x:null;}
function fmtAmt(a){const n=parseFloat(a);return isNaN(n)?null:n;}
function cur(c){return{EUR:'€',USD:'$',GBP:'£',CHF:'CHF'}[(c||'').toUpperCase()]||c||'€';}
function evtLabel(t){return{AUT:'Authorization',MOV:'Settlement',CAN:'Cancellation',STO:'Refund',PRE:'Pre-Auth'}[(t||'').toUpperCase()]||t||'—';}
function stLabel(s){return{AUT:'Authorized',MOV:'Settled',CAN:'Cancelled',STO:'Refunded',PRE:'Pre-Authorized',WAITAUT:'Waiting Auth'}[(s||'').toUpperCase()]||s||'—';}
function tdsLabel(s){return{Y:'Authenticated',N:'Not Authenticated',A:'Attempted',U:'Unavailable',R:'Rejected',C:'Challenge'}[s]||s||'—';}

function R(k,val,isBadge){
    if(isBadge)return`<div class="row"><span class="rk">${k}</span><span class="rv">${val}</span></div>`;
    if(val===null||val===undefined||val==='')return`<div class="row"><span class="rk">${k}</span><span class="rv nil">—</span></div>`;
    return`<div class="row"><span class="rk">${k}</span><span class="rv">${esc(String(val))}</span></div>`;
}
function Rt(k,val){
    if(val===null||val===undefined||val==='')return`<div class="row"><span class="rk">${k}</span><span class="rv txt nil">—</span></div>`;
    return`<div class="row"><span class="rk">${k}</span><span class="rv txt">${esc(String(val))}</span></div>`;
}
function badge(t,c){return`<span class="b b-${c}">${t}</span>`;}
function resBadge(r){const u=(r||'').toUpperCase();if(u==='APPROVED')return badge(r,'ok');if(u==='DECLINED')return badge(r,'ko');return badge(r||'—','wait');}
function toggle(h){h.classList.toggle('open');h.nextElementSibling.classList.toggle('open');}

/* GitHub icon */
const ghSvg=`<svg viewBox="0 0 16 16" fill="currentColor"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>`;
/* Status page icon (signal/pulse) */
const spSvg=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>`;

function footer(leftHtml, rightHtml){
    return`<div class="cfoot">
        <p>${leftHtml}</p>
        <div class="cfoot-mid">
            <a href="https://github.com/M2NDLAB/checkout-page" target="_blank" title="GitHub">${ghSvg}</a>
            <span class="cdot"></span>
            <a href="https://status.fabrick.com/" target="_blank" title="Fabrick Status">${spSvg}</a>
        </div>
        <div>${rightHtml}</div>
    </div>`;
}

/* ==== RENDER CARD ==== */
function renderCard(p){
    const ban=document.getElementById('ban'), bd=document.getElementById('body');
    const cfg=sc(p.transactionResult);
    const c=cur(p.currency);

    ban.className=`banner ${cfg.t}`;
    ban.innerHTML=`<div class="sicon">${cfg.i}</div><div class="stitle">${cfg.h}</div><div class="ssub">${cfg.s}</div>`;
    if(cfg.t==='wait')ban.querySelector('.sicon').classList.add('pulse');

    let h='';

    /* Warning */
    if(cfg.warn)h+=`<div class="warn-box"><span style="flex-shrink:0">⚠</span><p><strong>Do not fulfill this order yet.</strong><br>The outcome is not final. A S2S notification will confirm the result.</p></div>`;

    /* Amount */
    const amt=fmtAmt(p.events?.[0]?.event?.eventamount);
    if(amt!==null){
        const parts=amt.toFixed(2).split('.');
        const intPart=parseInt(parts[0]).toLocaleString('en-US');
        h+=`<div class="amt-bar"><span class="cur">${c}</span><span class="num">${intPart}</span><span class="dec">.${parts[1]}</span><span class="cur-code">${v(p.currency)||''}</span></div>`;
    }

    /* ---- CLUSTER: Transaction ---- */
    h+=`<div class="cluster"><div class="cl-title">Transaction</div>`;
    h+=R('transactionType', v(p.transactionType));
    h+=R('transactionResult', resBadge(p.transactionResult), true);
    h+=Rt('transactionState', v(p.transactionState)?stLabel(p.transactionState):null);
    h+=R('transactionErrorCode', v(p.transactionErrorCode));
    h+=Rt('transactionErrorDescription', v(p.transactionErrorDescription));
    h+=R('bankTransactionID', v(p.bankTransactionID));
    h+=R('authorizationCode', v(p.authorizationCode));
    h+=R('paymentID', v(p.paymentID));
    h+=`</div>`;

    /* ---- CLUSTER: Order ---- */
    h+=`<div class="cluster"><div class="cl-title">Order</div>`;
    h+=R('shopTransactionID', v(p.shopTransactionID));
    h+=R('shopTransactionID_2', v(p.shopTransactionID_2));
    h+=Rt('currency', v(p.currency));
    h+=Rt('country', v(p.country));
    h+=`</div>`;

    /* ---- CLUSTER: Payment Method ---- */
    h+=`<div class="cluster"><div class="cl-title">Payment Method</div>`;
    h+=v(p.paymentMethod)?R('paymentMethod',badge(p.paymentMethod,'blue'),true):R('paymentMethod',null);
    h+=Rt('company', v(p.company));
    h+=Rt('productType', v(p.productType));
    h+=R('maskedPAN', v(p.maskedPAN));
    h+=Rt('cvvPresent', v(p.cvvPresent));
    h+=R('tdLevel', v(p.tdLevel));
    h+=`</div>`;

    /* ---- CLUSTER: Token (collapsible) ---- */
    h+=`<div class="cluster">`;
    h+=`<div class="cl-head" onclick="toggle(this)"><span class="cl-title" style="padding:0">Token & Card</span><span class="chev">▼</span></div>`;
    h+=`<div class="cl-body">`;
    h+=R('token', v(p.token));
    h+=R('tokenExpiryMonth', v(p.tokenExpiryMonth));
    h+=R('tokenExpiryYear', v(p.tokenExpiryYear));
    if(p.tokenDetails){
        h+=`<div class="nest-label">tokenDetails</div>`;
        h+=R('TokenValue', v(p.tokenDetails.TokenValue));
        h+=R('TokenExpiryMonth', v(p.tokenDetails.TokenExpiryMonth));
        h+=R('TokenExpiryYear', v(p.tokenDetails.TokenExpiryYear));
        h+=Rt('TokenProvider', v(p.tokenDetails.TokenProvider));
        if(p.tokenDetails.CardDetails){
            h+=`<div class="nest-label">CardDetails</div>`;
            const cd=p.tokenDetails.CardDetails;
            h+=R('CardSuffix', v(cd.CardSuffix));
            h+=R('CardExpiryMonth', v(cd.CardExpiryMonth));
            h+=R('CardExpiryYear', v(cd.CardExpiryYear));
            h+=Rt('CardHolderName', v(cd.CardHolderName));
        }
        if(p.tokenDetails.CardAssets){
            h+=`<div class="nest-label">CardAssets</div>`;
            const ca=p.tokenDetails.CardAssets;
            ['CardArt','BrandLogo'].forEach(k=>{
                if(ca[k]){
                    h+=`<div class="nest-label" style="border:none;padding-top:4px">${k}</div>`;
                    Object.keys(ca[k]).forEach(sk=>h+=Rt(sk, v(ca[k][sk])));
                }
            });
        }
    } else { h+=Rt('tokenDetails','null'); }
    h+=`</div></div>`;

    /* ---- CLUSTER: 3D Secure (collapsible) ---- */
    h+=`<div class="cluster">`;
    h+=`<div class="cl-head" onclick="toggle(this)"><span class="cl-title" style="padding:0">3D Secure</span><span class="chev">▼</span></div>`;
    h+=`<div class="cl-body">`;
    if(p.threeDS){
        if(p.threeDS.authenticationResult){
            h+=`<div class="nest-label">authenticationResult</div>`;
            const ar=p.threeDS.authenticationResult;
            Object.keys(ar).forEach(k=>{
                if(k==='authenticationStatus'&&v(ar[k]))h+=R(k, badge(tdsLabel(ar[k]), ar[k]==='Y'?'ok':'wait'), true);
                else h+=R(k, v(ar[k]));
            });
        } else { h+=Rt('authenticationResult','null'); }
        if(p.threeDS.transDetails){
            h+=`<div class="nest-label">transDetails</div>`;
            Object.keys(p.threeDS.transDetails).forEach(k=>h+=R(k, v(p.threeDS.transDetails[k])));
        } else { h+=Rt('transDetails','null'); }
    } else { h+=Rt('threeDS','null'); }
    h+=`</div></div>`;

    /* ---- CLUSTER: Events (collapsible) ---- */
    h+=`<div class="cluster">`;
    h+=`<div class="cl-head" onclick="toggle(this)"><span class="cl-title" style="padding:0">Events${p.events?' ('+p.events.length+')':''}</span><span class="chev">▼</span></div>`;
    h+=`<div class="cl-body">`;
    if(p.events&&p.events.length){
        p.events.forEach((ev,i)=>{
            const e=ev.event;
            h+=`<div class="nest-label">event[${i}]</div>`;
            Object.keys(e).forEach(k=>h+=R(k, v(e[k])));
        });
    } else { h+=Rt('events','null'); }
    h+=`</div></div>`;

    /* ---- CLUSTER: Buyer & Risk ---- */
    h+=`<div class="cluster"><div class="cl-title">Buyer & Risk</div>`;
    if(p.buyer){
        Object.keys(p.buyer).forEach(k=>h+=Rt(k, v(p.buyer[k])));
    } else { h+=Rt('buyer','null'); }
    if(p.risk){
        h+=`<div class="nest-label">risk</div>`;
        Object.keys(p.risk).forEach(k=>h+=Rt(k, v(p.risk[k])));
    } else { h+=Rt('risk','null'); }
    h+=`</div>`;

    /* ---- CLUSTER: Fraud & Automation ---- */
    h+=`<div class="cluster"><div class="cl-title">Fraud & Automation</div>`;
    if(p.fraudPrevention){
        h+=`<div class="nest-label">fraudPrevention</div>`;
        Object.keys(p.fraudPrevention).forEach(k=>h+=Rt(k, v(p.fraudPrevention[k])));
    } else { h+=Rt('fraudPrevention','null'); }
    if(p.automaticOperation){
        h+=`<div class="nest-label">automaticOperation</div>`;
        const ao=p.automaticOperation;
        h+=Rt('type', v(ao.type)?evtLabel(ao.type):null);
        h+=Rt('date', v(ao.date));
        h+=R('amount', v(ao.amount)?`${c} ${fmtAmt(ao.amount)?.toFixed(2)}`:null);
    } else { h+=Rt('automaticOperation','null'); }
    h+=`</div>`;

    /* ---- CLUSTER: Other (catchall) ---- */
    const mapped=new Set([
        'transactionType','transactionResult','transactionState','transactionErrorCode',
        'transactionErrorDescription','bankTransactionID','authorizationCode','paymentID',
        'shopTransactionID','shopTransactionID_2','currency','country',
        'paymentMethod','company','productType','maskedPAN','cvvPresent','tdLevel',
        'token','tokenExpiryMonth','tokenExpiryYear','tokenDetails',
        'threeDS','events','buyer','risk','fraudPrevention','automaticOperation'
    ]);
    const others=Object.keys(p).filter(k=>!mapped.has(k));
    if(others.length){
        h+=`<div class="cluster"><div class="cl-title">Other</div>`;
        others.forEach(k=>{
            const val=p[k];
            if(val!==null&&typeof val==='object'){
                h+=Rt(k, JSON.stringify(val));
            } else {
                h+=Rt(k, v(val));
            }
        });
        h+=`</div>`;
    }

    h+=footer('Processed by <strong>M2NDLAB</strong> via Fabrick',`<div class="sid">ShopLogin: ${SL||'—'}</div><div class="sid" style="color:var(--wait);margin-top:1px;">⚠ SANDBOX</div>`);
    bd.innerHTML=h;
}

/* ==== RENDER ERROR ==== */
function renderErr(title,detail,errPayload){
    const ban=document.getElementById('ban'), bd=document.getElementById('body');
    ban.className='banner err';
    ban.innerHTML=`<div class="sicon">!</div><div class="stitle">${esc(title)}</div><div class="ssub">${esc(detail||'')}</div>`;
    let h='';
    if(US.toUpperCase()==='XX')h+=`<div class="warn-box"><span>⚠</span><p><strong>Do not fulfill this order yet.</strong><br>URL Status is XX (suspended).</p></div>`;

    /* Se c'è un errore applicativo Axerve, mostralo */
    if(errPayload?.error){
        h+=`<div class="cluster"><div class="cl-title">API Error</div>`;
        h+=R('code', v(errPayload.error.code));
        h+=Rt('description', v(errPayload.error.description));
        h+=`</div>`;
    }

    h+=`<div class="cluster"><div class="cl-title">Request Info</div>`;
    h+=R('shopLogin', SL);
    h+=Rt('urlStatus', US);
    h+=R('paymentID', PID);
    h+=Rt('environment', 'Sandbox');
    h+=`</div>`;
    h+=footer('Could not retrieve transaction details.',`<div class="sid">ShopLogin: ${SL||'—'}</div>`);
    bd.innerHTML=h;
}

function renderMissing(){
    const ban=document.getElementById('ban'), bd=document.getElementById('body');
    ban.className='banner err';
    ban.innerHTML=`<div class="sicon">!</div><div class="stitle">Missing Parameters</div><div class="ssub">Required URL parameters not found</div>`;
    bd.innerHTML=`<div style="padding:18px"><p style="font-size:12px;color:var(--t2);line-height:1.6;">This page requires URL parameters:<code style="display:block;margin-top:8px;padding:10px;background:var(--card-2);border-radius:8px;font-family:'JetBrains Mono',monospace;font-size:10.5px;word-break:break-all;">?a=SHOPLOGIN&Status=OK&paymentID=123&paymentToken=abc-def</code></p></div>`+footer('Processed by <strong>M2NDLAB</strong> via Fabrick','<p>Redirected here by mistake?</p>');
}

/* ==== FETCH ==== */
async function load(){
    if(!PID||!PT){renderMissing();return;}
    const ban=document.getElementById('ban');
    ban.className='banner load';
    ban.innerHTML=`<div class="sicon"><div class="spinner"></div></div><div class="stitle">Loading…</div><div class="ssub">Retrieving transaction</div>`;
    document.getElementById('body').innerHTML='';

    try{
        const res=await fetch(`${API}/v1/payment/detail/${PID}`,{method:'GET',headers:{'Content-Type':'application/json','PaymentToken':PT}});

        /*
         * IMPORTANTE: anche se res.ok è false (es. 400 Bad Request),
         * il body della risposta Axerve contiene il JSON con error.code
         * e error.description (es. "1457 - Expired paymentToken").
         * Quindi leggiamo SEMPRE il body prima di decidere cosa fare.
         */
        let data;
        try { data=await res.json(); } catch(e) { data=null; }
        setJson(data||{httpStatus:res.status,statusText:res.statusText});

        if(!res.ok){
            renderErr('API Error',`HTTP ${res.status} — ${res.statusText}`,data);
            return;
        }
        if(data.error&&data.error.code!=='0'){
            renderErr('Transaction Error',`[${data.error.code}] ${data.error.description}`,data);
            return;
        }
        if(!data.payload){renderErr('Unexpected Response','No payload in API response',data);return;}
        renderCard(data.payload);
    }catch(err){
        setJson({error:err.message});
        renderErr('Connection Error',`Unable to reach gateway. ${err.message||''}`,null);
    }
}

load();
</script>
