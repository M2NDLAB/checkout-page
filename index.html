<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M2NDLAB — Payment Result</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand-navy:    #002E6D;
            --brand-blue:    #0066CC;
            --brand-sky:     #E8F0FE;

            --color-approved:       #0A8754;
            --color-approved-bg:    #E6F4ED;
            --color-approved-ring:  #B7E4CD;
            --color-declined:       #C4320A;
            --color-declined-bg:    #FEF0EC;
            --color-declined-ring:  #F9C9B8;
            --color-waiting:        #B45309;
            --color-waiting-bg:     #FEF7EC;
            --color-waiting-ring:   #FDE7C2;

            --surface-0:  #F4F6F9;
            --surface-1:  #FFFFFF;
            --surface-2:  #F8F9FB;
            --border:     #E2E6ED;
            --border-light:#EEF0F4;

            --text-primary:   #0A1628;
            --text-secondary: #4A5568;
            --text-tertiary:  #8896A6;

            --radius-sm:  8px;
            --radius-md:  12px;
            --radius-xl:  20px;
            --shadow-card: 0 1px 3px rgba(0,0,0,.04), 0 4px 12px rgba(0,0,0,.06);
        }

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        html {
            font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            font-size: 14px;
            color: var(--text-primary);
            background: var(--surface-0);
            -webkit-font-smoothing: antialiased;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 24px 16px 40px;
        }

        .container { width: 100%; max-width: 780px; }

        /* =========================================================
           FLIP CARD
           ========================================================= */
        .card-wrapper { perspective: 1200px; position: relative; }

        .card-flipper {
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
            position: relative;
        }
        .card-flipper.flipped { transform: rotateY(180deg); }

        .card-front, .card-back {
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            background: var(--surface-1);
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-card);
            border: 1px solid var(--border-light);
            overflow: hidden;
        }

        .card-back {
            position: absolute;
            inset: 0;
            transform: rotateY(180deg);
            display: flex;
            flex-direction: column;
        }

        /* ---- Action buttons (corners of status banner) ---- */
        .card-actions {
            position: absolute;
            top: 12px; left: 12px; right: 12px;
            display: flex;
            justify-content: space-between;
            z-index: 10;
            pointer-events: none;
        }

        .card-btn {
            pointer-events: auto;
            width: 30px; height: 30px;
            border-radius: 7px;
            border: 1px solid rgba(255,255,255,0.15);
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            color: rgba(255,255,255,0.25);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.25s ease;
        }
        .card-btn:hover {
            background: rgba(255,255,255,0.92);
            color: var(--brand-navy);
            border-color: var(--border);
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .card-btn svg { width: 14px; height: 14px; }
        .card-btn.spinning svg { animation: spin 0.8s linear infinite; }

        /* ---- Status banner ---- */
        .status-banner {
            padding: 22px 28px 18px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        .status-banner::before {
            content: '';
            position: absolute;
            inset: 0;
            opacity: 0.06;
            background: radial-gradient(circle at 30% 20%, currentColor 0%, transparent 70%);
            pointer-events: none;
        }

        .status-banner.approved { background: var(--color-approved-bg); color: var(--color-approved); }
        .status-banner.declined { background: var(--color-declined-bg); color: var(--color-declined); }
        .status-banner.waiting  { background: var(--color-waiting-bg);  color: var(--color-waiting); }
        .status-banner.loading  { background: var(--brand-sky);         color: var(--brand-blue); }
        .status-banner.error    { background: var(--color-declined-bg); color: var(--color-declined); }

        .status-icon {
            width: 48px; height: 48px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 8px;
            font-size: 20px;
        }

        .status-banner.approved .status-icon { background: var(--color-approved); color: white; box-shadow: 0 0 0 5px var(--color-approved-ring); }
        .status-banner.declined .status-icon { background: var(--color-declined); color: white; box-shadow: 0 0 0 5px var(--color-declined-ring); }
        .status-banner.waiting  .status-icon { background: var(--color-waiting);  color: white; box-shadow: 0 0 0 5px var(--color-waiting-ring); }
        .status-banner.loading  .status-icon { background: var(--brand-blue);     color: white; box-shadow: 0 0 0 5px #B8D4F0; }
        .status-banner.error    .status-icon { background: var(--color-declined); color: white; box-shadow: 0 0 0 5px var(--color-declined-ring); }

        .status-title { font-size: 17px; font-weight: 700; margin-bottom: 2px; }
        .status-subtitle { font-size: 12px; opacity: 0.8; font-weight: 500; }

        /* ---- Amount ---- */
        .amount-section { padding: 14px 28px; text-align: center; border-bottom: 1px solid var(--border); }
        .amount-label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text-tertiary); margin-bottom: 2px; }
        .amount-value { font-size: 28px; font-weight: 700; color: var(--brand-navy); letter-spacing: -1px; }
        .amount-value .currency { font-size: 16px; font-weight: 600; vertical-align: super; margin-right: 2px; opacity: 0.7; }

        /* ---- Two-column detail grid ---- */
        .details-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0; padding: 0; }

        .detail-section { padding: 4px 0; }
        .detail-section.full-width { grid-column: 1 / -1; }

        .detail-group-title {
            font-size: 9.5px; font-weight: 700; text-transform: uppercase;
            letter-spacing: 1px; color: var(--text-tertiary); padding: 10px 18px 4px;
        }

        .detail-row {
            display: flex; justify-content: space-between; align-items: flex-start;
            padding: 4px 18px; gap: 8px;
        }
        .detail-row:hover { background: var(--surface-2); }

        .detail-label { font-size: 11.5px; color: var(--text-secondary); flex-shrink: 0; font-weight: 500; }
        .detail-value { font-size: 11px; font-weight: 600; color: var(--text-primary); text-align: right; word-break: break-all; font-family: 'JetBrains Mono', monospace; }
        .detail-value.text-font { font-family: 'DM Sans', sans-serif; font-size: 11.5px; }

        .detail-divider { grid-column: 1 / -1; height: 1px; background: var(--border-light); margin: 2px 18px; }

        /* ---- Badges ---- */
        .badge { display: inline-flex; align-items: center; gap: 4px; padding: 2px 7px; border-radius: 5px; font-size: 10.5px; font-weight: 600; font-family: 'DM Sans', sans-serif; }
        .badge-blue { background: var(--brand-sky); color: var(--brand-blue); }
        .badge-green { background: var(--color-approved-bg); color: var(--color-approved); }
        .badge-orange { background: var(--color-waiting-bg); color: var(--color-waiting); }
        .badge-red { background: var(--color-declined-bg); color: var(--color-declined); }
        .badge-neutral { background: var(--surface-2); color: var(--text-secondary); border: 1px solid var(--border); }

        /* ---- Warning ---- */
        .suspended-warning { margin: 0 14px; padding: 10px 12px; background: var(--color-waiting-bg); border: 1px solid var(--color-waiting-ring); border-radius: var(--radius-sm); display: flex; gap: 8px; align-items: flex-start; }
        .suspended-warning .warn-icon { flex-shrink: 0; font-size: 13px; line-height: 1.4; }
        .suspended-warning p { font-size: 11px; color: var(--color-waiting); font-weight: 500; line-height: 1.5; }

        /* ---- Events ---- */
        .event-item { display: flex; align-items: center; gap: 8px; padding: 5px 18px; }
        .event-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--brand-blue); flex-shrink: 0; }
        .event-info { flex: 1; display: flex; justify-content: space-between; align-items: center; }
        .event-type { font-size: 11px; font-weight: 600; }
        .event-date { font-size: 10px; color: var(--text-tertiary); font-family: 'JetBrains Mono', monospace; }
        .event-amount { font-size: 11px; font-weight: 600; font-family: 'JetBrains Mono', monospace; }

        /* ---- Collapsible ---- */
        .collapsible-header { cursor: pointer; display: flex; align-items: center; justify-content: space-between; padding: 10px 18px 4px; user-select: none; }
        .collapsible-header .chevron { transition: transform 0.2s ease; color: var(--text-tertiary); font-size: 10px; }
        .collapsible-header.open .chevron { transform: rotate(180deg); }
        .collapsible-content { max-height: 0; overflow: hidden; transition: max-height 0.3s ease; }
        .collapsible-content.open { max-height: 800px; }

        /* ---- Card footer ---- */
        .card-footer { padding: 12px 18px; border-top: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .card-footer p { font-size: 10.5px; color: var(--text-tertiary); line-height: 1.4; }
        .card-footer .tx-id { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text-tertiary); }

        /* ---- Page footer ---- */
        .page-footer { margin-top: 16px; display: flex; align-items: center; gap: 8px; align-self: flex-start; }
        .page-footer .brand { font-size: 12px; font-weight: 700; color: var(--brand-navy); letter-spacing: -0.3px; opacity: 0.4; }
        .page-footer .dot { width: 3px; height: 3px; border-radius: 50%; background: var(--text-tertiary); opacity: 0.4; }
        .page-footer a { display: flex; align-items: center; color: var(--text-tertiary); opacity: 0.4; transition: opacity 0.2s; text-decoration: none; }
        .page-footer a:hover { opacity: 1; }
        .page-footer a svg { width: 15px; height: 15px; }

        /* ---- JSON back ---- */
        .json-view-header { padding: 14px 18px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; background: var(--surface-2); }
        .json-view-header h3 { font-size: 12px; font-weight: 700; }
        .json-view-body { flex: 1; overflow: auto; padding: 14px 18px; background: #1a1e2e; }
        .json-view-body pre { font-family: 'JetBrains Mono', monospace; font-size: 10.5px; line-height: 1.6; color: #c8d3e0; white-space: pre-wrap; word-break: break-all; }
        .json-key { color: #7dd3fc; }
        .json-str { color: #86efac; }
        .json-num { color: #fbbf24; }
        .json-bool { color: #c084fc; }
        .json-null { color: #9ca3af; font-style: italic; }

        .btn-close-json {
            padding: 3px 10px; border-radius: 5px; border: 1px solid var(--border);
            background: var(--surface-1); font-size: 10.5px; font-weight: 600;
            color: var(--text-secondary); cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all 0.2s;
        }
        .btn-close-json:hover { background: var(--brand-navy); color: white; border-color: var(--brand-navy); }

        /* ---- Animations ---- */
        .spinner { width: 20px; height: 20px; border: 3px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .pulse { animation: pulse 2s ease-in-out infinite; }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
        .card-front { animation: fadeUp 0.4s ease-out; }

        /* ---- Responsive ---- */
        @media (max-width: 600px) {
            .details-grid { grid-template-columns: 1fr; }
            .detail-section.full-width { grid-column: 1; }
            .detail-divider { grid-column: 1; }
            body { padding: 16px 10px 32px; }
            .card-footer { flex-direction: column; gap: 4px; text-align: center; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="card-wrapper">
            <div class="card-actions">
                <button class="card-btn" id="btnRefresh" title="Refresh" onclick="refreshDetail()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 2v6h-6"/><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/>
                        <path d="M3 22v-6h6"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/>
                    </svg>
                </button>
                <button class="card-btn" id="btnJson" title="View raw JSON" onclick="toggleJsonView()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/>
                    </svg>
                </button>
            </div>

            <div class="card-flipper" id="cardFlipper">
                <div class="card-front" id="cardFront">
                    <div class="status-banner loading" id="statusBanner">
                        <div class="status-icon"><div class="spinner"></div></div>
                        <div class="status-title">Loading payment details…</div>
                        <div class="status-subtitle">Retrieving transaction information</div>
                    </div>
                    <div id="cardBody"></div>
                </div>
                <div class="card-back" id="cardBack">
                    <div class="json-view-header">
                        <h3>Raw API Response</h3>
                        <button class="btn-close-json" onclick="toggleJsonView()">← Back</button>
                    </div>
                    <div class="json-view-body">
                        <pre id="jsonContent">No data yet.</pre>
                    </div>
                </div>
            </div>
        </div>

        <div class="page-footer">
            <span class="brand">M2NDLAB</span>
            <span class="dot"></span>
            <a href="https://github.com/M2NDLAB/checkout-page" target="_blank" rel="noopener noreferrer" title="View on GitHub">
                <svg viewBox="0 0 16 16" fill="currentColor">
                    <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/>
                </svg>
            </a>
        </div>
    </div>

    <script>
        /**
         * =====================================================================
         * PAYMENT RESULT PAGE — M2NDLAB
         * =====================================================================
         * Flusso:
         *   1. Parse dei parametri URL (a, Status, paymentID, paymentToken)
         *   2. Chiamata GET /payment/detail/{paymentID} (sandbox only)
         *   3. Rendering del risultato in base a transactionResult:
         *      APPROVED | DECLINED | PENDING | WAITING | UNSUBMITTED
         *
         * Mapping Status URL → transactionResult (doc ufficiale Axerve):
         *   OK → APPROVED | KO → DECLINED | XX → PENDING/WAITING/UNSUBMITTED
         * =====================================================================
         */

        const params       = new URLSearchParams(window.location.search);
        const shopLogin    = params.get('a')            || '';
        const urlStatus    = params.get('Status')       || '';
        const paymentID    = params.get('paymentID')    || '';
        const paymentToken = params.get('paymentToken') || '';

        /** Solo sandbox. Per produzione: riattivare logica prefisso ShopLogin. */
        const apiBase = 'https://sandbox.gestpay.net/api';

        /** Ultima risposta raw — per vista JSON e refresh */
        let lastRawResponse = null;

        // ==================================================================
        // FLIP & REFRESH
        // ==================================================================

        function toggleJsonView() {
            document.getElementById('cardFlipper').classList.toggle('flipped');
        }

        function syntaxHighlight(json) {
            return JSON.stringify(json, null, 2).replace(
                /("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g,
                (m) => {
                    let c = 'json-num';
                    if (/^"/.test(m)) c = /:$/.test(m) ? 'json-key' : 'json-str';
                    else if (/true|false/.test(m)) c = 'json-bool';
                    else if (/null/.test(m)) c = 'json-null';
                    return `<span class="${c}">${m}</span>`;
                }
            );
        }

        function updateJsonView(data) {
            lastRawResponse = data;
            document.getElementById('jsonContent').innerHTML = data ? syntaxHighlight(data) : 'No data available.';
        }

        async function refreshDetail() {
            const btn = document.getElementById('btnRefresh');
            btn.classList.add('spinning');
            document.getElementById('cardFlipper').classList.remove('flipped');
            await fetchPaymentDetail();
            btn.classList.remove('spinning');
        }

        // ==================================================================
        // STATUS CONFIG
        // ==================================================================

        function getStatusConfig(result) {
            const r = (result || '').toUpperCase();
            if (r === 'APPROVED' || r === 'OK')
                return { theme: 'approved', icon: '✓', title: 'Payment Approved', subtitle: 'Your transaction has been successfully processed' };
            if (r === 'DECLINED' || r === 'KO')
                return { theme: 'declined', icon: '✕', title: 'Payment Declined', subtitle: 'The transaction could not be completed' };
            if (['PENDING','WAITING','UNSUBMITTED','XX'].includes(r)) {
                const sub = { PENDING:'Awaiting confirmation from the payment provider', WAITING:'The payment is still being processed', UNSUBMITTED:'The payment has not been submitted yet', XX:'The payment status is not yet final' };
                return { theme: 'waiting', icon: '⏳', title: 'Payment Pending', subtitle: sub[r]||'Awaiting confirmation', showSuspendedWarning: true };
            }
            return { theme: 'declined', icon: '?', title: 'Unknown Status', subtitle: `Transaction result: ${result||'N/A'}` };
        }

        // ==================================================================
        // HELPERS
        // ==================================================================

        function currencySymbol(c) { return {EUR:'€',USD:'$',GBP:'£',CHF:'CHF'}[(c||'').toUpperCase()]||c||'€'; }
        function formatAmount(a) { const n=parseFloat(a); return isNaN(n)?a||'—':n.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2}); }
        function eventTypeLabel(t) { return {AUT:'Authorization',MOV:'Settlement',CAN:'Cancellation',STO:'Refund',PRE:'Pre-Authorization',PREAUT:'Pre-Authorization'}[(t||'').toUpperCase()]||t||'—'; }
        function stateLabel(s) { return {AUT:'Authorized',MOV:'Settled',CAN:'Cancelled',STO:'Refunded',PRE:'Pre-Authorized',WAITAUT:'Waiting Auth'}[(s||'').toUpperCase()]||s||'—'; }
        function threeDsStatusLabel(s) { return {Y:'Authenticated',N:'Not Authenticated',A:'Attempted',U:'Unavailable',R:'Rejected',C:'Challenge Required'}[s]||s||'—'; }
        function v(x) { return (x!==null&&x!==undefined&&x!=='')?x:'—'; }

        function row(label, value, mono=true, raw=false, text=false) {
            const cls = text ? 'detail-value text-font' : 'detail-value';
            return `<div class="detail-row"><span class="detail-label">${label}</span><span class="${cls}">${raw?value:v(value)}</span></div>`;
        }

        function badge(text, variant) { return `<span class="badge badge-${variant}">${text}</span>`; }
        function resultVariant(r) { return r==='APPROVED'?'green':r==='DECLINED'?'red':'orange'; }

        function toggleSection(h) { h.classList.toggle('open'); h.nextElementSibling.classList.toggle('open'); }

        // ==================================================================
        // RENDER CARD — ALL fields, two-column layout
        // ==================================================================

        function renderCard(p) {
            const banner = document.getElementById('statusBanner');
            const body   = document.getElementById('cardBody');
            const cfg    = getStatusConfig(p.transactionResult);
            const curr   = currencySymbol(p.currency);
            const amt    = p.events?.[0]?.event?.eventamount;

            banner.className = `status-banner ${cfg.theme}`;
            banner.innerHTML = `<div class="status-icon">${cfg.icon}</div><div class="status-title">${cfg.title}</div><div class="status-subtitle">${cfg.subtitle}</div>`;
            if (cfg.theme==='waiting') banner.querySelector('.status-icon').classList.add('pulse');

            let h = '';

            if (cfg.showSuspendedWarning) {
                h += `<div class="suspended-warning" style="margin:12px 14px 0;"><span class="warn-icon">⚠</span><p><strong>Do not fulfill this order yet.</strong><br>The payment outcome is not final. A S2S notification will confirm the definitive result.</p></div>`;
            }

            if (amt) {
                h += `<div class="amount-section"><div class="amount-label">Total Amount</div><div class="amount-value"><span class="currency">${curr}</span>${formatAmount(amt)}</div></div>`;
            }

            h += `<div class="details-grid">`;

            // COL 1 — Order
            h += `<div class="detail-section">`;
            h += `<div class="detail-group-title">Order Details</div>`;
            h += row('Transaction Type', v(p.transactionType), false, false, true);
            h += row('Shop TX ID', p.shopTransactionID);
            h += row('Shop TX ID 2', p.shopTransactionID_2);
            h += row('Payment ID', p.paymentID);
            h += row('Bank TX ID', p.bankTransactionID);
            h += row('Auth Code', p.authorizationCode);
            h += `</div>`;

            // COL 2 — Payment
            h += `<div class="detail-section">`;
            h += `<div class="detail-group-title">Payment Information</div>`;
            h += row('Method', badge(v(p.paymentMethod),'blue'), false, true);
            h += row('Product Type', v(p.productType), false, false, true);
            h += row('Company', v(p.company), false, false, true);
            h += row('Currency', v(p.currency), false, false, true);
            h += row('Country', v(p.country), false, false, true);
            h += row('CVV Present', p.cvvPresent==='TRUE'?badge('Yes','green'):badge('No','neutral'), false, true);
            h += row('Masked PAN', v(p.maskedPAN));
            h += `</div>`;

            h += `<div class="detail-divider"></div>`;

            // COL 1 — State
            h += `<div class="detail-section">`;
            h += `<div class="detail-group-title">Transaction State</div>`;
            h += row('Result', badge(v(p.transactionResult), resultVariant(p.transactionResult)), false, true);
            h += row('State', v(stateLabel(p.transactionState)), false, false, true);
            h += row('Error Code', v(p.transactionErrorCode));
            h += row('Error Desc', v(p.transactionErrorDescription), false, false, true);
            h += row('Alert Code', v(p.alertCode));
            h += row('Alert Desc', v(p.alertDescription), false, false, true);
            h += `</div>`;

            // COL 2 — Token / Card
            h += `<div class="detail-section">`;
            h += `<div class="detail-group-title">Card & Token</div>`;
            const td = p.tokenDetails;
            const cd = td?.CardDetails;
            h += row('Token', v(td?.TokenValue));
            h += row('Token Expiry', td?`${v(td.TokenExpiryMonth)}/${v(td.TokenExpiryYear)}`:'—');
            h += row('Token Provider', v(td?.TokenProvider), false, false, true);
            h += row('Card Suffix', v(cd?.CardSuffix));
            h += row('Card Expiry', cd?`${v(cd.CardExpiryMonth)}/${v(cd.CardExpiryYear)}`:'—');
            h += row('Cardholder', v(cd?.CardHolderName), false, false, true);
            h += `</div>`;

            h += `<div class="detail-divider"></div>`;

            // FULL — 3D Secure (collapsible)
            if (p.threeDS) {
                const ar = p.threeDS.authenticationResult||{};
                const td3 = p.threeDS.transDetails||{};
                h += `<div class="detail-section full-width">`;
                h += `<div class="collapsible-header" onclick="toggleSection(this)"><span class="detail-group-title" style="padding:0">3D Secure</span><span class="chevron">▼</span></div>`;
                h += `<div class="collapsible-content"><div class="details-grid">`;
                h += `<div class="detail-section">`;
                h += row('Auth Status', badge(threeDsStatusLabel(ar.authenticationStatus), ar.authenticationStatus==='Y'?'green':'orange'), false, true);
                h += row('Auth Level', v(ar.authenticationLevel), false, false, true);
                h += row('Status Reason', v(ar.authStatusReason));
                h += row('Challenge Trans', v(ar.challengeResultTransStatus));
                h += row('XID', v(ar.XID));
                h += row('AV', v(ar.AV));
                h += `</div><div class="detail-section">`;
                h += row('ECI', v(ar.ECI));
                h += row('AV Algorithm', v(ar.AVAlgorithm));
                h += row('3DS Version', v(ar.threeDsVersion));
                h += row('TD Level', v(p.tdLevel), false, false, true);
                h += row('Auth Data', v(td3.authData));
                h += row('Auth Method', v(td3.authMethod));
                h += row('Auth Timestamp', v(td3.authTimeStamp));
                h += row('ACS ID', v(td3.acsID));
                h += `</div></div></div></div>`;
            }

            // FULL — Events (collapsible)
            if (p.events?.length) {
                h += `<div class="detail-section full-width">`;
                h += `<div class="collapsible-header" onclick="toggleSection(this)"><span class="detail-group-title" style="padding:0">Events (${p.events.length})</span><span class="chevron">▼</span></div>`;
                h += `<div class="collapsible-content">`;
                p.events.forEach(ev => {
                    const e = ev.event;
                    h += `<div class="event-item"><div class="event-dot"></div><div class="event-info"><div><div class="event-type">${eventTypeLabel(e.eventtype)}</div><div class="event-date">${v(e.eventdate)}</div></div><div class="event-amount">${curr} ${formatAmount(e.eventamount)}</div></div></div>`;
                    if (e.eventARN||e.eventID||e.eventReferred)
                        h += `<div style="padding:0 18px 2px 32px;font-size:10px;color:var(--text-tertiary);font-family:'JetBrains Mono',monospace;">${e.eventARN?'ARN:'+e.eventARN+' ':''}${e.eventID?'ID:'+e.eventID+' ':''}${e.eventReferred?'Ref:'+e.eventReferred:''}</div>`;
                });
                h += `</div></div>`;
            }

            h += `<div class="detail-divider"></div>`;

            // COL 1 — Buyer
            h += `<div class="detail-section">`;
            h += `<div class="detail-group-title">Buyer</div>`;
            h += row('Name', v(p.buyer?.name), false, false, true);
            h += row('Email', v(p.buyer?.email));
            h += `</div>`;

            // COL 2 — Risk & Fraud
            h += `<div class="detail-section">`;
            h += `<div class="detail-group-title">Risk & Fraud</div>`;
            h += row('Risk Code', v(p.risk?.riskResponseCode));
            h += row('Risk Desc', v(p.risk?.riskResponseDescription), false, false, true);
            h += row('Fraud Check', v(p.fraudPrevention?.check), false, false, true);
            h += row('Fraud State', v(p.fraudPrevention?.state), false, false, true);
            h += row('Fraud Desc', v(p.fraudPrevention?.description), false, false, true);
            h += row('Fraud Order', v(p.fraudPrevention?.order));
            h += `</div>`;

            h += `<div class="detail-divider"></div>`;

            // COL 1 — Auto Operation
            h += `<div class="detail-section">`;
            h += `<div class="detail-group-title">Automatic Operation</div>`;
            const ao = p.automaticOperation;
            h += row('Type', ao?.type?eventTypeLabel(ao.type):'—', false, false, true);
            h += row('Date', v(ao?.date), false, false, true);
            h += row('Amount', ao?.amount?`${curr} ${formatAmount(ao.amount)}`:'—');
            h += `</div>`;

            // COL 2 — Other
            h += `<div class="detail-section">`;
            h += `<div class="detail-group-title">Other</div>`;
            h += row('DCC', p.dcc?JSON.stringify(p.dcc):'—', false, false, true);
            h += row('Custom Info', p.customInfo?JSON.stringify(p.customInfo):'—', false, false, true);
            h += `</div>`;

            h += `</div>`; // close grid

            // Footer
            h += `<div class="card-footer"><p>Processed by <strong>M2NDLAB</strong> via Fabrick</p><div><div class="tx-id">ShopLogin: ${v(shopLogin)}</div><div class="tx-id" style="color:var(--color-waiting);margin-top:2px;">⚠ SANDBOX</div></div></div>`;

            body.innerHTML = h;
        }

        // ==================================================================
        // RENDER ERROR
        // ==================================================================

        function renderError(message, detail) {
            const banner = document.getElementById('statusBanner');
            const body   = document.getElementById('cardBody');

            banner.className = 'status-banner error';
            banner.innerHTML = `<div class="status-icon">!</div><div class="status-title">${message}</div><div class="status-subtitle">${detail||''}</div>`;

            let h = '';
            if (urlStatus.toUpperCase()==='XX') {
                h += `<div class="suspended-warning" style="margin:12px 14px 0;"><span class="warn-icon">⚠</span><p><strong>Do not fulfill this order yet.</strong><br>URL Status is XX (suspended). The final outcome will arrive via S2S notification.</p></div>`;
            }
            h += `<div class="details-grid"><div class="detail-section full-width">`;
            h += `<div class="detail-group-title">Available Information</div>`;
            h += row('Shop Login', shopLogin);
            h += row('URL Status', urlStatus, false, false, true);
            h += row('Payment ID', paymentID);
            h += row('Environment', 'Sandbox', false, false, true);
            h += `</div></div>`;
            h += `<div class="card-footer"><p>Could not retrieve full transaction details.</p><div class="tx-id">ShopLogin: ${v(shopLogin)}</div></div>`;

            body.innerHTML = h;
        }

        function renderMissingParams() {
            const banner = document.getElementById('statusBanner');
            const body   = document.getElementById('cardBody');
            banner.className = 'status-banner error';
            banner.innerHTML = `<div class="status-icon">!</div><div class="status-title">Missing Parameters</div><div class="status-subtitle">Required URL parameters not found</div>`;
            body.innerHTML = `<div style="padding:18px;"><p style="font-size:12px;color:var(--text-secondary);line-height:1.6;">This page requires URL parameters:<code style="display:block;margin-top:8px;padding:10px;background:var(--surface-2);border-radius:8px;font-family:'JetBrains Mono',monospace;font-size:10.5px;word-break:break-all;">?a=SHOPLOGIN&Status=OK&paymentID=123&paymentToken=abc-def</code></p></div><div class="card-footer"><p>You were probably redirected here by mistake.</p><span></span></div>`;
        }

        // ==================================================================
        // FETCH
        // ==================================================================

        async function fetchPaymentDetail() {
            if (!paymentID||!paymentToken) { renderMissingParams(); return; }

            const banner = document.getElementById('statusBanner');
            banner.className = 'status-banner loading';
            banner.innerHTML = `<div class="status-icon"><div class="spinner"></div></div><div class="status-title">Loading payment details…</div><div class="status-subtitle">Retrieving transaction information</div>`;
            document.getElementById('cardBody').innerHTML = '';

            try {
                const res = await fetch(`${apiBase}/v1/payment/detail/${paymentID}`, {
                    method: 'GET',
                    headers: { 'Content-Type': 'application/json', 'PaymentToken': paymentToken }
                });

                if (!res.ok) {
                    updateJsonView({ httpStatus: res.status, statusText: res.statusText });
                    renderError('API Error', `HTTP ${res.status} — ${res.statusText}`);
                    return;
                }

                const data = await res.json();
                updateJsonView(data);

                if (data.error && data.error.code !== '0') {
                    renderError('Transaction Error', `[${data.error.code}] ${data.error.description}`);
                    return;
                }
                if (!data.payload) { renderError('Unexpected Response', 'No payload in API response'); return; }

                renderCard(data.payload);
            } catch (err) {
                updateJsonView({ error: err.message });
                renderError('Connection Error', `Unable to reach the payment gateway. ${err.message||''}`);
            }
        }

        // ==================================================================
        // BOOT
        // ==================================================================
        fetchPaymentDetail();
    </script>
</body>
</html>
