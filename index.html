<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M2NDLAB — Payment Result</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand-navy:    #002E6D;
            --brand-blue:    #0066CC;
            --brand-sky:     #E8F0FE;

            --color-approved:       #0A8754;
            --color-approved-bg:    #E6F4ED;
            --color-approved-ring:  #B7E4CD;
            --color-declined:       #C4320A;
            --color-declined-bg:    #FEF0EC;
            --color-declined-ring:  #F9C9B8;
            --color-waiting:        #B45309;
            --color-waiting-bg:     #FEF7EC;
            --color-waiting-ring:   #FDE7C2;

            --surface-0:  #F4F6F9;
            --surface-1:  #FFFFFF;
            --surface-2:  #F8F9FB;
            --border:     #E2E6ED;
            --border-light:#EEF0F4;

            --text-primary:   #0A1628;
            --text-secondary: #4A5568;
            --text-tertiary:  #8896A6;

            --radius-sm:  8px;
            --radius-xl:  20px;
            --shadow-card: 0 1px 3px rgba(0,0,0,.04), 0 4px 12px rgba(0,0,0,.06);
        }

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        html {
            font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            font-size: 14px;
            color: var(--text-primary);
            background: var(--surface-0);
            -webkit-font-smoothing: antialiased;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 24px 16px 40px;
        }

        .container { width: 100%; max-width: 780px; }

        /* =========================================================
           FLIP CARD
           ========================================================= */
        .card-wrapper { perspective: 1200px; position: relative; }

        .card-flipper {
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
            position: relative;
        }
        .card-flipper.flipped { transform: rotateY(180deg); }

        .card-front, .card-back {
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            background: var(--surface-1);
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-card);
            border: 1px solid var(--border-light);
            overflow: hidden;
        }

        .card-back {
            position: absolute;
            inset: 0;
            transform: rotateY(180deg);
            display: flex;
            flex-direction: column;
        }

        /* ---- Action buttons ---- */
        .card-actions {
            position: absolute;
            top: 12px; left: 12px; right: 12px;
            display: flex;
            justify-content: space-between;
            z-index: 10;
            pointer-events: none;
        }

        .card-btn {
            pointer-events: auto;
            width: 30px; height: 30px;
            border-radius: 7px;
            border: 1px solid transparent;
            background: transparent;
            color: rgba(255,255,255,0.0);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }
        .card-btn:hover {
            background: rgba(255,255,255,0.92);
            color: var(--brand-navy);
            border-color: var(--border);
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .card-btn svg { width: 14px; height: 14px; }
        .card-btn.spinning svg { animation: spin 0.8s linear infinite; }

        /* Back-side action buttons: dark theme */
        .card-back-actions {
            position: absolute;
            top: 12px; left: 12px; right: 12px;
            display: flex;
            justify-content: space-between;
            z-index: 10;
            pointer-events: none;
        }

        .card-btn-back {
            pointer-events: auto;
            width: 30px; height: 30px;
            border-radius: 7px;
            border: 1px solid transparent;
            background: transparent;
            color: transparent;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }
        .card-btn-back:hover {
            background: rgba(255,255,255,0.12);
            color: #c8d3e0;
            border-color: rgba(255,255,255,0.15);
        }
        .card-btn-back svg { width: 14px; height: 14px; }
        .card-btn-back.spinning svg { animation: spin 0.8s linear infinite; }

        /* ---- Status banner ---- */
        .status-banner {
            padding: 22px 28px 18px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        .status-banner::before {
            content: '';
            position: absolute; inset: 0;
            opacity: 0.06;
            background: radial-gradient(circle at 30% 20%, currentColor 0%, transparent 70%);
            pointer-events: none;
        }

        .status-banner.approved { background: var(--color-approved-bg); color: var(--color-approved); }
        .status-banner.declined { background: var(--color-declined-bg); color: var(--color-declined); }
        .status-banner.waiting  { background: var(--color-waiting-bg);  color: var(--color-waiting); }
        .status-banner.loading  { background: var(--brand-sky);         color: var(--brand-blue); }
        .status-banner.error    { background: var(--color-declined-bg); color: var(--color-declined); }

        .status-icon {
            width: 48px; height: 48px; border-radius: 50%;
            display: inline-flex; align-items: center; justify-content: center;
            margin-bottom: 8px; font-size: 20px;
        }

        .status-banner.approved .status-icon { background: var(--color-approved); color: white; box-shadow: 0 0 0 5px var(--color-approved-ring); }
        .status-banner.declined .status-icon { background: var(--color-declined); color: white; box-shadow: 0 0 0 5px var(--color-declined-ring); }
        .status-banner.waiting  .status-icon { background: var(--color-waiting);  color: white; box-shadow: 0 0 0 5px var(--color-waiting-ring); }
        .status-banner.loading  .status-icon { background: var(--brand-blue);     color: white; box-shadow: 0 0 0 5px #B8D4F0; }
        .status-banner.error    .status-icon { background: var(--color-declined); color: white; box-shadow: 0 0 0 5px var(--color-declined-ring); }

        .status-title { font-size: 17px; font-weight: 700; margin-bottom: 2px; }
        .status-subtitle { font-size: 12px; opacity: 0.8; font-weight: 500; }

        /* ---- Amount ---- */
        .amount-section { padding: 14px 28px; text-align: center; border-bottom: 1px solid var(--border); }
        .amount-label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text-tertiary); margin-bottom: 2px; }
        .amount-value { font-size: 28px; font-weight: 700; color: var(--brand-navy); letter-spacing: -1px; }
        .amount-value .currency { font-size: 16px; font-weight: 600; vertical-align: super; margin-right: 2px; opacity: 0.7; }

        /* ---- Warning ---- */
        .suspended-warning { margin: 0 14px; padding: 10px 12px; background: var(--color-waiting-bg); border: 1px solid var(--color-waiting-ring); border-radius: var(--radius-sm); display: flex; gap: 8px; align-items: flex-start; }
        .suspended-warning .warn-icon { flex-shrink: 0; font-size: 13px; line-height: 1.4; }
        .suspended-warning p { font-size: 11px; color: var(--color-waiting); font-weight: 500; line-height: 1.5; }

        /* ---- Dynamic payload rows ---- */
        .payload-section { padding: 6px 0; }

        .payload-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            padding: 4px 20px;
            gap: 12px;
            min-height: 26px;
        }
        .payload-row:hover { background: var(--surface-2); }

        .payload-key {
            font-size: 11.5px;
            color: var(--text-secondary);
            font-weight: 500;
            flex-shrink: 0;
            min-width: 140px;
        }

        .payload-val {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-primary);
            text-align: right;
            word-break: break-all;
            font-family: 'JetBrains Mono', monospace;
        }

        .payload-val.null-val {
            color: var(--text-tertiary);
            font-style: italic;
            font-weight: 400;
        }

        /* Nested object toggle */
        .nested-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 20px;
            cursor: pointer;
            user-select: none;
            transition: background 0.15s;
        }
        .nested-header:hover { background: var(--surface-2); }

        .nested-header .nested-key {
            font-size: 11.5px;
            font-weight: 600;
            color: var(--brand-navy);
        }

        .nested-header .nested-toggle {
            font-size: 10px;
            color: var(--text-tertiary);
            transition: transform 0.2s;
            flex-shrink: 0;
        }
        .nested-header.open .nested-toggle { transform: rotate(180deg); }

        .nested-header .nested-tag {
            font-size: 9.5px;
            font-family: 'JetBrains Mono', monospace;
            color: var(--text-tertiary);
            margin-left: 6px;
            font-weight: 400;
        }

        .nested-body {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease;
            border-left: 2px solid var(--border-light);
            margin-left: 20px;
        }
        .nested-body.open { max-height: 2000px; }

        /* Null nested — shown inline */
        .nested-null {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 4px 20px;
            gap: 12px;
        }
        .nested-null .payload-key { color: var(--text-secondary); font-weight: 500; }
        .nested-null .payload-val { color: var(--text-tertiary); font-style: italic; font-weight: 400; }

        /* Array items */
        .array-item-header {
            font-size: 9.5px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-tertiary);
            padding: 6px 20px 2px;
        }

        .payload-divider {
            height: 1px;
            background: var(--border-light);
            margin: 4px 20px;
        }

        /* Badges for special values */
        .badge { display: inline-flex; align-items: center; padding: 2px 7px; border-radius: 5px; font-size: 10.5px; font-weight: 600; font-family: 'DM Sans', sans-serif; }
        .badge-blue { background: var(--brand-sky); color: var(--brand-blue); }
        .badge-green { background: var(--color-approved-bg); color: var(--color-approved); }
        .badge-red { background: var(--color-declined-bg); color: var(--color-declined); }
        .badge-orange { background: var(--color-waiting-bg); color: var(--color-waiting); }

        /* ---- Card footer ---- */
        .card-footer {
            padding: 12px 20px;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .card-footer p { font-size: 10.5px; color: var(--text-tertiary); line-height: 1.4; }
        .card-footer .shop-id { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text-tertiary); text-align: right; }

        /* ---- Page footer ---- */
        .page-footer {
            margin-top: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .page-footer a {
            display: flex;
            align-items: center;
            color: var(--text-tertiary);
            opacity: 0.35;
            transition: opacity 0.2s;
            text-decoration: none;
        }
        .page-footer a:hover { opacity: 1; }
        .page-footer a svg { width: 18px; height: 18px; }

        /* ---- JSON back view ---- */
        .json-view-header {
            padding: 12px 18px;
            border-bottom: 1px solid rgba(255,255,255,0.06);
            background: #1e2235;
            display: flex;
            align-items: center;
        }
        .json-view-header h3 {
            font-size: 11px;
            font-weight: 600;
            color: #7a8599;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .json-view-body {
            flex: 1;
            overflow: auto;
            padding: 14px 18px;
            background: #171b2b;
        }
        .json-view-body pre {
            font-family: 'JetBrains Mono', monospace;
            font-size: 10.5px;
            line-height: 1.6;
            color: #c8d3e0;
            white-space: pre-wrap;
            word-break: break-all;
        }
        .json-key { color: #7dd3fc; }
        .json-str { color: #86efac; }
        .json-num { color: #fbbf24; }
        .json-bool { color: #c084fc; }
        .json-null { color: #9ca3af; font-style: italic; }

        /* ---- Animations ---- */
        .spinner { width: 20px; height: 20px; border: 3px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .pulse { animation: pulse 2s ease-in-out infinite; }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
        .card-front { animation: fadeUp 0.4s ease-out; }

        /* ---- Responsive ---- */
        @media (max-width: 600px) {
            body { padding: 16px 10px 32px; }
            .payload-key { min-width: 100px; }
            .card-footer { flex-direction: column; gap: 4px; text-align: center; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="card-wrapper">

            <!-- Front action buttons -->
            <div class="card-actions" id="frontActions">
                <button class="card-btn" id="btnRefresh" title="Refresh" onclick="refreshDetail()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 2v6h-6"/><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/>
                        <path d="M3 22v-6h6"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/>
                    </svg>
                </button>
                <button class="card-btn" id="btnJson" title="View raw JSON" onclick="flipToJson()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/>
                    </svg>
                </button>
            </div>

            <div class="card-flipper" id="cardFlipper">
                <!-- FRONT -->
                <div class="card-front" id="cardFront">
                    <div class="status-banner loading" id="statusBanner">
                        <div class="status-icon"><div class="spinner"></div></div>
                        <div class="status-title">Loading payment details…</div>
                        <div class="status-subtitle">Retrieving transaction information</div>
                    </div>
                    <div id="cardBody"></div>
                </div>

                <!-- BACK — Raw JSON -->
                <div class="card-back" id="cardBack">
                    <!-- Back action buttons (inside the back card) -->
                    <div class="card-back-actions">
                        <button class="card-btn-back" title="Refresh" onclick="refreshDetail()">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M21 2v6h-6"/><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/>
                                <path d="M3 22v-6h6"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/>
                            </svg>
                        </button>
                        <button class="card-btn-back" title="Back to details" onclick="flipToFront()">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                                <polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/>
                            </svg>
                        </button>
                    </div>
                    <div class="json-view-header">
                        <h3>Raw API Response</h3>
                    </div>
                    <div class="json-view-body">
                        <pre id="jsonContent">No data yet.</pre>
                    </div>
                </div>
            </div>
        </div>

        <!-- Page footer — just GitHub icon -->
        <div class="page-footer">
            <a href="https://github.com/M2NDLAB/checkout-page" target="_blank" rel="noopener noreferrer" title="View on GitHub">
                <svg viewBox="0 0 16 16" fill="currentColor">
                    <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/>
                </svg>
            </a>
        </div>
    </div>

    <script>
        /**
         * =====================================================================
         * PAYMENT RESULT PAGE — M2NDLAB
         * =====================================================================
         *
         * Renderer dinamico: itera le chiavi del payload JSON così come arrivano.
         * - Valori primitivi (string, number, boolean) → riga key/value
         * - null → riga con "null" in corsivo
         * - Oggetti annidati → sezione espandibile/collassabile
         * - Array → sezione espandibile con item numerati
         * - Annidamenti ricorsivi supportati a qualsiasi profondità
         *
         * Non c'è raggruppamento manuale: la struttura riflette il JSON.
         * =====================================================================
         */

        const params       = new URLSearchParams(window.location.search);
        const shopLogin    = params.get('a')            || '';
        const urlStatus    = params.get('Status')       || '';
        const paymentID    = params.get('paymentID')    || '';
        const paymentToken = params.get('paymentToken') || '';

        const apiBase = 'https://sandbox.gestpay.net/api';

        let lastRawResponse = null;

        // ==================================================================
        // FLIP
        // ==================================================================

        function flipToJson() {
            document.getElementById('cardFlipper').classList.add('flipped');
        }
        function flipToFront() {
            document.getElementById('cardFlipper').classList.remove('flipped');
        }

        // ==================================================================
        // JSON SYNTAX HIGHLIGHT
        // ==================================================================

        function syntaxHighlight(json) {
            return JSON.stringify(json, null, 2).replace(
                /("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g,
                (m) => {
                    let c = 'json-num';
                    if (/^"/.test(m)) c = /:$/.test(m) ? 'json-key' : 'json-str';
                    else if (/true|false/.test(m)) c = 'json-bool';
                    else if (/null/.test(m)) c = 'json-null';
                    return `<span class="${c}">${m}</span>`;
                }
            );
        }

        function updateJsonView(data) {
            lastRawResponse = data;
            document.getElementById('jsonContent').innerHTML = data ? syntaxHighlight(data) : 'No data available.';
        }

        async function refreshDetail() {
            const btn = document.getElementById('btnRefresh');
            btn.classList.add('spinning');
            document.getElementById('cardFlipper').classList.remove('flipped');
            await fetchPaymentDetail();
            btn.classList.remove('spinning');
        }

        // ==================================================================
        // STATUS CONFIG
        // ==================================================================

        function getStatusConfig(result) {
            const r = (result || '').toUpperCase();
            if (r === 'APPROVED' || r === 'OK')
                return { theme: 'approved', icon: '✓', title: 'Payment Approved', subtitle: 'Your transaction has been successfully processed' };
            if (r === 'DECLINED' || r === 'KO')
                return { theme: 'declined', icon: '✕', title: 'Payment Declined', subtitle: 'The transaction could not be completed' };
            if (['PENDING','WAITING','UNSUBMITTED','XX'].includes(r)) {
                const sub = { PENDING:'Awaiting confirmation from the payment provider', WAITING:'The payment is still being processed', UNSUBMITTED:'The payment has not been submitted yet', XX:'The payment status is not yet final' };
                return { theme: 'waiting', icon: '⏳', title: 'Payment Pending', subtitle: sub[r]||'Awaiting confirmation', showSuspendedWarning: true };
            }
            return { theme: 'declined', icon: '?', title: 'Unknown Status', subtitle: `Transaction result: ${result||'N/A'}` };
        }

        // ==================================================================
        // HELPERS
        // ==================================================================

        function currencySymbol(c) { return {EUR:'€',USD:'$',GBP:'£',CHF:'CHF'}[(c||'').toUpperCase()]||c||'€'; }
        function formatAmount(a) { const n=parseFloat(a); return isNaN(n)?a||'—':n.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2}); }

        /**
         * Determina se un valore merita un badge colorato.
         * Applica badge solo a pochi campi semanticamente rilevanti
         * per dare feedback visivo immediato.
         */
        function maybeFormatValue(key, value) {
            if (value === null || value === undefined) return '<span class="payload-val null-val">null</span>';
            if (value === '') return '<span class="payload-val null-val">—</span>';

            const s = String(value);
            const k = key.toLowerCase();

            // transactionResult
            if (k === 'transactionresult') {
                const v = s.toUpperCase();
                if (v === 'APPROVED') return `<span class="badge badge-green">${s}</span>`;
                if (v === 'DECLINED') return `<span class="badge badge-red">${s}</span>`;
                return `<span class="badge badge-orange">${s}</span>`;
            }
            // paymentMethod / company
            if (k === 'paymentmethod' || k === 'company') {
                return `<span class="badge badge-blue">${s}</span>`;
            }
            // boolean-like
            if (s === 'TRUE') return `<span class="badge badge-green">TRUE</span>`;
            if (s === 'FALSE') return `<span class="badge badge-orange">FALSE</span>`;

            // default: monospace value
            return `<span class="payload-val">${escapeHtml(s)}</span>`;
        }

        function escapeHtml(s) {
            return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
        }

        // ==================================================================
        // DYNAMIC RENDERER — walks JSON keys as they are
        // ==================================================================

        /**
         * Genera l'HTML per un oggetto, iterando le chiavi nell'ordine originale.
         * 
         * - Primitivi → riga key/value
         * - null → riga con "null"
         * - Oggetti → sezione collassabile (ricorsiva)
         * - Array → sezione collassabile con item (se array di oggetti, 
         *           ogni item è una sotto-sezione)
         *
         * @param {Object} obj        - L'oggetto da renderizzare
         * @param {string} idPrefix   - Prefisso per gli ID (per espansione unica)
         * @returns {string} HTML
         */
        function renderObject(obj, idPrefix = 'p') {
            if (!obj || typeof obj !== 'object') return '';

            let html = '';
            const keys = Object.keys(obj);

            for (let i = 0; i < keys.length; i++) {
                const key = keys[i];
                const val = obj[key];
                const uid = `${idPrefix}_${key}`;

                if (val === null || val === undefined) {
                    // null → inline row
                    html += `<div class="payload-row">
                        <span class="payload-key">${key}</span>
                        <span class="payload-val null-val">null</span>
                    </div>`;
                }
                else if (Array.isArray(val)) {
                    // Array → collapsible
                    if (val.length === 0) {
                        html += `<div class="payload-row">
                            <span class="payload-key">${key}</span>
                            <span class="payload-val null-val">[ ] (empty)</span>
                        </div>`;
                    } else {
                        html += `<div class="nested-header" onclick="toggleNested('${uid}', this)">
                            <div><span class="nested-key">${key}</span><span class="nested-tag">Array[${val.length}]</span></div>
                            <span class="nested-toggle">▼</span>
                        </div>`;
                        html += `<div class="nested-body" id="${uid}">`;
                        val.forEach((item, idx) => {
                            if (item !== null && typeof item === 'object') {
                                html += `<div class="array-item-header">[${idx}]</div>`;
                                html += renderObject(item, `${uid}_${idx}`);
                            } else {
                                html += `<div class="payload-row">
                                    <span class="payload-key">[${idx}]</span>
                                    ${maybeFormatValue(key, item)}
                                </div>`;
                            }
                        });
                        html += `</div>`;
                    }
                }
                else if (typeof val === 'object') {
                    // Nested object → collapsible
                    const childKeys = Object.keys(val);
                    html += `<div class="nested-header" onclick="toggleNested('${uid}', this)">
                        <div><span class="nested-key">${key}</span><span class="nested-tag">{${childKeys.length}}</span></div>
                        <span class="nested-toggle">▼</span>
                    </div>`;
                    html += `<div class="nested-body" id="${uid}">`;
                    html += renderObject(val, uid);
                    html += `</div>`;
                }
                else {
                    // Primitive → key/value row
                    html += `<div class="payload-row">
                        <span class="payload-key">${key}</span>
                        ${maybeFormatValue(key, val)}
                    </div>`;
                }
            }

            return html;
        }

        function toggleNested(id, header) {
            const body = document.getElementById(id);
            if (!body) return;
            header.classList.toggle('open');
            body.classList.toggle('open');
        }

        // ==================================================================
        // RENDER CARD
        // ==================================================================

        function renderCard(payload) {
            const banner = document.getElementById('statusBanner');
            const body   = document.getElementById('cardBody');
            const cfg    = getStatusConfig(payload.transactionResult);

            // Banner
            banner.className = `status-banner ${cfg.theme}`;
            banner.innerHTML = `<div class="status-icon">${cfg.icon}</div><div class="status-title">${cfg.title}</div><div class="status-subtitle">${cfg.subtitle}</div>`;
            if (cfg.theme === 'waiting') banner.querySelector('.status-icon').classList.add('pulse');

            let html = '';

            // Warning per stato sospeso
            if (cfg.showSuspendedWarning) {
                html += `<div class="suspended-warning" style="margin:12px 14px 0;">
                    <span class="warn-icon">⚠</span>
                    <p><strong>Do not fulfill this order yet.</strong><br>
                    The payment outcome is not final. A S2S notification will confirm the definitive result.</p>
                </div>`;
            }

            // Amount (dal primo evento se presente)
            const amt = payload.events?.[0]?.event?.eventamount;
            const curr = currencySymbol(payload.currency);
            if (amt && parseFloat(amt) > 0) {
                html += `<div class="amount-section">
                    <div class="amount-label">Total Amount</div>
                    <div class="amount-value"><span class="currency">${curr}</span>${formatAmount(amt)}</div>
                </div>`;
            }

            // Dynamic payload rendering
            html += `<div class="payload-section">`;
            html += renderObject(payload, 'payload');
            html += `</div>`;

            // Footer
            html += `<div class="card-footer">
                <p>Processed by <strong>M2NDLAB</strong> via Fabrick</p>
                <div>
                    <div class="shop-id">ShopLogin: ${shopLogin || '—'}</div>
                    <div class="shop-id" style="color:var(--color-waiting);margin-top:2px;">⚠ SANDBOX</div>
                </div>
            </div>`;

            body.innerHTML = html;
        }

        // ==================================================================
        // RENDER ERROR
        // ==================================================================

        function renderError(message, detail) {
            const banner = document.getElementById('statusBanner');
            const body   = document.getElementById('cardBody');

            banner.className = 'status-banner error';
            banner.innerHTML = `<div class="status-icon">!</div><div class="status-title">${message}</div><div class="status-subtitle">${detail||''}</div>`;

            let html = '';
            if (urlStatus.toUpperCase() === 'XX') {
                html += `<div class="suspended-warning" style="margin:12px 14px 0;">
                    <span class="warn-icon">⚠</span>
                    <p><strong>Do not fulfill this order yet.</strong><br>
                    URL Status is XX (suspended). The final outcome will arrive via S2S notification.</p>
                </div>`;
            }

            html += `<div class="payload-section">`;
            html += `<div class="payload-row"><span class="payload-key">shopLogin</span><span class="payload-val">${escapeHtml(shopLogin||'—')}</span></div>`;
            html += `<div class="payload-row"><span class="payload-key">urlStatus</span><span class="payload-val">${escapeHtml(urlStatus||'—')}</span></div>`;
            html += `<div class="payload-row"><span class="payload-key">paymentID</span><span class="payload-val">${escapeHtml(paymentID||'—')}</span></div>`;
            html += `<div class="payload-row"><span class="payload-key">environment</span><span class="payload-val">Sandbox</span></div>`;
            html += `</div>`;

            html += `<div class="card-footer">
                <p>Could not retrieve full transaction details.</p>
                <div class="shop-id">ShopLogin: ${shopLogin||'—'}</div>
            </div>`;

            body.innerHTML = html;
        }

        function renderMissingParams() {
            const banner = document.getElementById('statusBanner');
            const body   = document.getElementById('cardBody');
            banner.className = 'status-banner error';
            banner.innerHTML = `<div class="status-icon">!</div><div class="status-title">Missing Parameters</div><div class="status-subtitle">Required URL parameters not found</div>`;
            body.innerHTML = `<div style="padding:18px;">
                <p style="font-size:12px;color:var(--text-secondary);line-height:1.6;">
                    This page requires URL parameters:
                    <code style="display:block;margin-top:8px;padding:10px;background:var(--surface-2);border-radius:8px;font-family:'JetBrains Mono',monospace;font-size:10.5px;word-break:break-all;">
                        ?a=SHOPLOGIN&Status=OK&paymentID=123&paymentToken=abc-def
                    </code>
                </p>
            </div>
            <div class="card-footer"><p>You were probably redirected here by mistake.</p><span></span></div>`;
        }

        // ==================================================================
        // FETCH
        // ==================================================================

        async function fetchPaymentDetail() {
            if (!paymentID || !paymentToken) { renderMissingParams(); return; }

            const banner = document.getElementById('statusBanner');
            banner.className = 'status-banner loading';
            banner.innerHTML = `<div class="status-icon"><div class="spinner"></div></div><div class="status-title">Loading payment details…</div><div class="status-subtitle">Retrieving transaction information</div>`;
            document.getElementById('cardBody').innerHTML = '';

            try {
                const res = await fetch(`${apiBase}/v1/payment/detail/${paymentID}`, {
                    method: 'GET',
                    headers: { 'Content-Type': 'application/json', 'PaymentToken': paymentToken }
                });

                if (!res.ok) {
                    updateJsonView({ httpStatus: res.status, statusText: res.statusText });
                    renderError('API Error', `HTTP ${res.status} — ${res.statusText}`);
                    return;
                }

                const data = await res.json();
                updateJsonView(data);

                if (data.error && data.error.code !== '0') {
                    renderError('Transaction Error', `[${data.error.code}] ${data.error.description}`);
                    return;
                }
                if (!data.payload) { renderError('Unexpected Response', 'No payload in API response'); return; }

                renderCard(data.payload);
            } catch (err) {
                updateJsonView({ error: err.message });
                renderError('Connection Error', `Unable to reach the payment gateway. ${err.message||''}`);
            }
        }

        // ==================================================================
        // BOOT
        // ==================================================================
        fetchPaymentDetail();
    </script>
</body>
</html>
